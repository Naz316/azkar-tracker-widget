<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azkar Tracker Notion</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #3B1414;
            --accent: #cc0000;
            --card: rgba(255, 255, 255, 0.05);
            --text: #FFFFFF;
            --text-dim: #B1A2C1;
            --font-arabic: 'Amiri', serif;
            --base-font-size: 22px; 
        }

        * { box-sizing: border-box; }
        body {
            background: transparent; font-family: 'Inter', sans-serif;
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            overflow: hidden; display: flex; justify-content: center;
        }

        .widget {
            width: 100%; height: 100vh; background-color: var(--bg);
            padding: 20px; display: flex; flex-direction: column;
            position: relative; transition: background-color 0.3s ease;
        }

        /* HEADER */
        .header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; height: 60px; margin-bottom: 10px; z-index: 100; }
        .header-left, .header-right { display: flex; }
        .header-right { justify-content: flex-end; }
        .icon-btn {
            background: none; border: none; cursor: pointer;
            width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 32px;
        }
        .icon-btn img { width: 36px; height: 36px; object-fit: contain; }

        .floating-icon { width: 65px; height: 65px; cursor: pointer; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        /* TABS - Updated for 5 items */
        .tabs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 15px; }
        .tab {
            background: transparent; border: none; color: var(--text-dim);
            padding: 10px 2px; border-radius: 14px; cursor: pointer;
            font-size: 11px; font-weight: 700; text-align: center;
            transition: 0.15s; display: flex; flex-direction: column; align-items: center;
        }
        .tab.active { background: var(--accent); color: white; }
        .tab span { font-size: 22px; margin-bottom: 4px; }

        /* MAIN CONTENT */
        .main-display {
            flex-grow: 1; overflow-y: auto; padding: 20px; text-align: center;
            display: flex; flex-direction: column; background: rgba(0,0,0,0.15);
            border-radius: 20px; margin-bottom: 15px; justify-content: flex-start;
            position: relative;
        }
        .arabic { font-family: var(--font-arabic); direction: rtl; line-height: 1.7; margin-bottom: 15px; white-space: pre-wrap; transition: 0.3s; }
        .translation { line-height: 1.5; transition: 0.3s; }

        /* Typography Logic */
        .lang-ar .arabic { font-size: var(--base-font-size); color: var(--text); font-weight: 700; }
        .lang-ar .translation { font-size: calc(var(--base-font-size) * 0.65); color: var(--text-dim); font-weight: 400; }
        .lang-en .arabic { font-size: calc(var(--base-font-size) * 0.8); color: var(--text-dim); font-weight: 400; }
        .lang-en .translation { font-size: calc(var(--base-font-size) * 0.85); color: var(--text); font-weight: 700; }

        /* FAVORITE TOGGLE */
        .fav-btn {
            position: absolute; top: 10px; right: 15px; background: none; border: none;
            cursor: pointer; padding: 5px; transition: 0.2s;
        }
        .fav-btn svg { width: 24px; height: 24px; fill: rgba(255,255,255,0.2); transition: 0.2s; }
        .fav-btn.active svg { fill: #ff4757; }
        .fav-btn::after {
            content: attr(data-tooltip); position: absolute; top: 35px; right: 0;
            background: #333; color: white; font-size: 10px; padding: 4px 8px;
            border-radius: 4px; visibility: hidden; opacity: 0; white-space: nowrap;
        }
        .fav-btn:hover::after { visibility: visible; opacity: 1; }

        /* FOOTER */
        .footer-controls { display: flex; justify-content: space-between; align-items: center; height: 90px; flex-shrink: 0; }
        .side-info { flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 80px; }
        .info-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 4px;}
        .info-value { font-size: 14px; color: var(--text); font-weight: 700; }

        .counter-container {
            position: relative; width: 80px; height: 80px; display: flex; align-items: center;
            justify-content: center; cursor: pointer; margin: 0 5px; border-radius: 50%; transition: 0.3s;
        }
        .counter-container.completed { box-shadow: 0 0 15px var(--accent); }
        .counter-container svg { position: absolute; transform: rotate(-90deg); width: 100%; height: 100%; }
        .circle-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 6; }
        .circle-progress { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.15s ease; }
        #circleCount { font-size: 28px; font-weight: 700; color: var(--text); z-index: 2; }
        .nav-btn { background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; padding: 10px; }

        /* MENU */
        .menu-popover {
            position: absolute; top: 75px; right: 20px; background: #1A1A1A;
            padding: 18px; border-radius: 16px; visibility: hidden; opacity: 0;
            transition: 0.1s; z-index: 1000; width: 260px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
        }
        .menu-popover.show { visibility: visible; opacity: 1; }
        .menu-section-title { color: white; font-size: 14px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .menu-divider { height: 1px; background: rgba(255,255,255,0.15); margin: 0 0 15px 0; border: none; }
        
        .color-menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .color-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); transition: 0.15s; display: flex; align-items: center; justify-content: center; }
        .color-dot.active { border-color: white; }
        .color-dot.active::after { content: '✓'; color: white; font-size: 12px; }

        .settings-rows { display: flex; flex-direction: column; gap: 10px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; color: white; font-size: 13px; font-weight: 600; }
        .font-slider { width: 80px; accent-color: var(--accent); }

        /* ACTION BUTTONS */
        .action-btns { display: flex; gap: 8px; margin-top: 10px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
        .action-btn {
            flex: 1; height: 40px; border-radius: 10px; border: none; cursor: pointer;
            background: var(--accent); display: flex; align-items: center; justify-content: center;
            position: relative; transition: 0.2s;
        }
        .action-btn svg { width: 20px; height: 20px; fill: white; }
        .action-btn:hover { filter: brightness(1.2); }
        .action-btn::after {
            content: attr(data-tooltip); position: absolute; bottom: 48px; background: #333;
            color: white; font-size: 10px; padding: 4px 8px; border-radius: 4px;
            visibility: hidden; opacity: 0; transition: 0.2s; white-space: nowrap;
        }
        .action-btn:hover::after { visibility: visible; opacity: 1; }

        /* SHARE MENU */
        .share-menu { 
            position: absolute; bottom: 135px; right: 20px; background: #1A1A1A; 
            border-radius: 12px; padding: 8px; width: 160px; display: none;
            border: 1px solid rgba(255,255,255,0.1); z-index: 1100;
        }
        .share-item {
            display: flex; align-items: center; gap: 10px; padding: 8px;
            color: white; text-decoration: none; font-size: 13px; border-radius: 8px; transition: 0.2s;
        }
        .share-item:hover { background: rgba(255,255,255,0.1); }
        .share-item svg { width: 18px; height: 18px; fill: white; }

        /* UI ELEMENTS */
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .2s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: #888; transition: .2s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(18px); background-color: white; }

        .main-display::-webkit-scrollbar { width: 4px; }
        .main-display::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>

<script>
// --- FULL DATA ---
const azkarData = [
    {
        nameEn: "Waking Up", nameAr: "الاستيقاظ",
        arabic: [
            "لَا إِلٰهَ إِلاَّ اللّٰهُ الْوَاحِدُ الْقَهَّارُ ، رَبُّ السَّمٰـوٰتِ وَالْأَرْضِ وَمَا بَيْنَهُمَا الْعَزِيْزُ الْغَفَّارُ",
            "لَا إِلَهَ إِلَّا اللّٰهُ وَحْدَهُ لَا شَرِيْكَ لَهُ ، لَهُ الْمُلْكُ ، وَلَهُ الْحَمْدُ ، وَهو عَلَىٰ كُلِّ شَيْءٍ قَدِيْرٌ‏ ، اَلْحَمْدُ لِلّٰهِ‏ ، وَسُبْحَانَ اللّٰهِ ، وَلَا إِلٰهَ إِلَّا اللّٰهُ ، وَاللّٰهُ أَكْبَرُ ، وَلَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللّٰهِ ، اَللّٰهُمَّ اغْفِرْ لِيْ.",

            "There is no god worthy of worship but Allah: The One, The All-Dominant; Lord of the heavens, the earth and whatever is between them; The Mighty, The Most Forgiving.",
            "There is no god worthy of worship but Allah. He is Alone and He has no partner whatsoever. To Him Alone belong all sovereignty and all praise. He is over all things All-Powerful. All praise be to Allah and Allah is free from imperfection. There is no god but Allah. Allah is the Greatest. There is no power (in averting evil) or strength (in attaining good) except through Allah. O Allah, forgive me.",
            "All praise is for Allah Who granted me well-being in my body, and returned my soul to me and allowed me to remember Him.",
            "All praise is for Allah who gave us life after having taken it from us, and unto Him is the resurrection.",
            "Indeed, in the creation of the heavens and the earth and the alternation of the day and night there are signs for people of reason. (3:190) (They are) those who remember Allah while standing, sitting, and lying on their sides, and reflect on the creation of the heavens and the earth (and pray), “Our Lord! You have not created (all of) this without purpose. Glory be to You! Protect us from the torment of the Fire. (3:191) Our Lord! Indeed, those You commit to the Fire will be (completely) disgraced! And the wrongdoers will have no helpers. (3:192) Our Lord! We have heard the caller to (true) belief, (proclaiming,) ‘Believe in your Lord (alone),’ so we believed. Our Lord! Forgive our sins, absolve us of our misdeeds, and allow us ˹each˺ to die as one of the virtuous. (3:193) Our Lord! Grant us what You have promised us through Your messengers and do not put us to shame on Judgment Day—for certainly You never fail in Your promise.” (3:194) So their Lord responded to them: “I will never deny any of you—male or female—the reward of your deeds. Both are equal in reward. Those who migrated or were expelled from their homes, and were persecuted for My sake and fought and (some) were martyred—I will certainly forgive their sins and admit them into Gardens under which rivers flow, as a reward from Allah. And with Allah is the finest reward!” (3:195) Do not be deceived by the prosperity of the disbelievers throughout the land. (3:196) It is only a brief enjoyment. Then Hell will be their home—what an evil place to rest! (3:197) But those who are mindful of their Lord will be in Gardens under which rivers flow, to stay there forever—as an accommodation from Allah. And what is with Allah is best for the virtuous. (3:198) Indeed, there are some among the People of the Book who truly believe in Allah and what has been revealed to you and what was revealed to them. They humble themselves before Allah—never trading Allah’s revelations for a fleeting gain. Their reward is with their Lord. Surely Allah is swift in reckoning. (3:199) O believers! Patiently endure, persevere, stand on guard, and be mindful of Allah, so you may be successful. (3:200)"

        trans: [
            "I seek the protection of Allah from the accursed Shayṭān. Allah, there is no god worthy of worship but He, the Ever Living, The Sustainer of all. Neither drowsiness overtakes Him nor sleep. To Him Alone belongs whatever is in the heavens and whatever is on the earth. Who is it that can intercede with Him except with His permission? He knows what is before them and what will be after them, and they encompass not a thing of His knowledge except for what He wills. His Kursī extends over the heavens and the earth, and their preservation does not tire Him. And He is the Most High, the Magnificent. (2:255)",
            "In the name of Allah, the All-Merciful, the Very Merciful. Say, He is Allah, the One, the Self-Sufficient Master, Who has not given birth and was not born, and to Whom no one is equal. (112)",
            "In the name of Allah, the All-Merciful, the Very Merciful. Say, I seek protection of the Lord of the daybreak, from the evil of what He has created, and from the evil of the darkening night when it settles, and from the evil of the blowers in knots, and from the evil of the envier when he envies. (113)",
            " In the name of Allah, the All-Merciful, the Very Merciful. Say, I seek protection of the Lord of mankind, the King of mankind, the God of mankind, from the evil of the whisperer who withdraws, who whispers in the hearts of mankind, whether they be Jinn or people. (114)",
            "O Allah, You are my Lord. There is no god worthy of worship except You. You have created me, and I am Your slave, and I am under Your covenant and pledge (to fulfil it) to the best of my ability. I seek Your protection from the evil that I have done. I acknowledge the favours that You have bestowed upon me, and I admit my sins. Forgive me, for none forgives sins but You.",
            "O Allah, I seek Your protection from anxiety and grief. I seek Your protection from inability and laziness. I seek Your protection from cowardice and miserliness, and I seek Your protection from being overcome by debt and being overpowered by men.",
            "O Allah, I ask You for well-being in this world and the next. O Allah, I ask You for forgiveness and well-being in my religion, in my worldly affairs, in my family and in my wealth. O Allah, conceal my faults and calm my fears. O Allah, guard me from in front of me and behind me, from my right, and from my left, and from above me. I seek protection in Your Greatness from being unexpectedly destroyed from beneath me.",
            "O Allah, Knower of the unseen and the seen, Creator of the heavens and the earth, the Lord and Sovereign of everything; I bear witness that there is no god worthy of worship but You. I seek Your protection from the evil of my own self, from the evil of Shayṭān and from the evil of polytheism to which he calls,and from inflicting evil on myself, or bringing it upon a Muslim.",
            "O The Ever Living, The Sustainer of all. ; I seek assistance through Your mercy. Rectify all of my affairs and do not entrust me to myself for the blink of an eye.",
            "O Allah, all the favours that I or anyone from Your creation has received in the morning, are from You Alone. You have no partner. To You Alone belong all praise and all thanks.",

            "I have entered the morning praising You, and I bear witness that there is no god worthy of worship but Allah.",
            "We have entered the morning and at this very time the whole kingdom belongs to Allah. All praise is due to Allah. There is no god worthy of worship except Allah, the One; He has no partner with Him. The entire kingdom belongs solely to Him, to Him is all praise due, and He is All-Powerful over everything. My Lord, I ask You for the good that is in this day and the good that follows it, and I seek Your protection from the evil that is in this day and from the evil that follows it. My Lord, I seek Your protection from laziness and the misery of old age. My Lord, I seek Your protection from the torment of the Hell-fire and the punishment of the grave.",
            "We have entered the morning and at this very time the whole kingdom belongs to Allah, Lord of the Worlds. O Allah, I ask You for the goodness of this day: its victory, its help, its light, and its blessings and guidance. I seek Your protection from the evil that is in it and from the evil that follows it.",
            "O Allah, I have entered the morning, and I call upon You, the bearers of Your Throne, Your angels and all creation, to bear witness that surely You are Allah. There is no god worthy of worship except You Alone. You have no partners, and that Muḥammad ﷺ is Your slave and Your Messenger.",
            "O Allah, by You we have entered the morning and by You we enter upon the evening. By You, we live and we die, and to You is the resurrection.",
            "O Allah, grant me well-being in my body. O Allah, grant me well-being in my hearing. O Allah, grant me well-being in my sight. There is no god worthy of worship except You. O Allah, I seek Your protection from disbelief and poverty and I seek Your protection from the punishment of the grave. There is no god worthy of worship except You.",
            "Allah is sufficient for me. There is no god worthy of worship except Him. I have placed my trust in Him only and He is the Lord of the Magnificent Throne.",
            "I am pleased with Allah as my Lord, with Islām as my religion and with Muḥammad ﷺ as my Prophet.",

            "Allah is free from imperfection, and all praise is due to Him.",
            "There is no god worthy of worship except Allah. He is Alone and He has no partner whatsoever. To Him Alone belong all sovereignty and all praise. He is over all things All-Powerful.",
            "Allah is free from imperfection. All praise be to Allah. Allah is the Greatest.",
            "O Allah, honour and have mercy upon Muhammad and the family of Muhammad as You have honoured and had mercy upon Ibrāhīm and the family of Ibrāhīm. Indeed, You are the Most Praiseworthy, the Most Glorious. O Allah, bless Muhammad and the family of Muhammad as You have blessed Ibrāhīm and the family of Ibrāhīm. Indeed, You are the Most Praiseworthy, the Most Glorious.",
            "I seek Allah’s forgiveness and turn to Him in repentance.",
            "Allah is free from imperfection and all praise is due to Him, (in ways) as numerous as all He has created, (as vast) as His pleasure, (as limitless) as the weight of His Throne, and (as endless) as the ink of His words."

        trans: [
            "I seek the protection of Allah from the accursed Shayṭān. Allah, there is no god worthy of worship but He, the Ever Living, The Sustainer of all. Neither drowsiness overtakes Him nor sleep. To Him Alone belongs whatever is in the heavens and whatever is on the earth. Who is it that can intercede with Him except with His permission? He knows what is before them and what will be after them, and they encompass not a thing of His knowledge except for what He wills. His Kursī extends over the heavens and the earth, and their preservation does not tire Him. And He is the Most High, the Magnificent. (2:255)",
            "In the name of Allah, the All-Merciful, the Very Merciful. Say, He is Allah, the One, the Self-Sufficient Master, Who has not given birth and was not born, and to Whom no one is equal. (112)",
            "In the name of Allah, the All-Merciful, the Very Merciful. Say, I seek protection of the Lord of the daybreak, from the evil of what He has created, and from the evil of the darkening night when it settles, and from the evil of the blowers in knots, and from the evil of the envier when he envies. (113)",
            " In the name of Allah, the All-Merciful, the Very Merciful. Say, I seek protection of the Lord of mankind, the King of mankind, the God of mankind, from the evil of the whisperer who withdraws, who whispers in the hearts of mankind, whether they be Jinn or people. (114)",
            "O Allah, You are my Lord. There is no god worthy of worship except You. You have created me, and I am Your slave, and I am under Your covenant and pledge (to fulfil it) to the best of my ability. I seek Your protection from the evil that I have done. I acknowledge the favours that You have bestowed upon me, and I admit my sins. Forgive me, for none forgives sins but You.",
            "O Allah, I seek Your protection from anxiety and grief. I seek Your protection from inability and laziness. I seek Your protection from cowardice and miserliness, and I seek Your protection from being overcome by debt and being overpowered by men.",
            "O Allah, I ask You for well-being in this world and the next. O Allah, I ask You for forgiveness and well-being in my religion, in my worldly affairs, in my family and in my wealth. O Allah, conceal my faults and calm my fears. O Allah, guard me from in front of me and behind me, from my right, and from my left, and from above me. I seek protection in Your Greatness from being unexpectedly destroyed from beneath me.",
            "O Allah, Knower of the unseen and the seen, Creator of the heavens and the earth, the Lord and Sovereign of everything; I bear witness that there is no god worthy of worship but You. I seek Your protection from the evil of my own self, from the evil of Shayṭān and from the evil of polytheism to which he calls,and from inflicting evil on myself, or bringing it upon a Muslim.",
            "O The Ever Living, The Sustainer of all. ; I seek assistance through Your mercy. Rectify all of my affairs and do not entrust me to myself for the blink of an eye.",
            "O Allah, all the favours that I or anyone from Your creation has received in the evening, are from You Alone. You have no partner. To You Alone belong all praise and all thanks.",
            "We have entered the evening upon the natural religion of Islam, the statement of pure faith (i.e. Shahādah), the religion of our Prophet Muhammad ﷺ and upon the way of our father Ibrāhيm, who turned away from all that is false, having surrendered to Allah, and he was not of the polytheists. (Nasā’ī)",
            "I have entered the evening praising You, and I bear witness that there is no god worthy of worship but Allah.",
            "We have entered the evening and at this very time the whole kingdom belongs to Allah. All praise is due to Allah. There is no god worthy of worship except Allah, the One; He has no partner with Him. The entire kingdom belongs solely to Him, to Him is all praise due, and He is All-Powerful over everything. My Lord, I ask You for the good that is in this night and the good that follows it, and I seek Your protection from the evil that is in this night and from the evil that follows it. My Lord, I seek Your protection from laziness and the misery of old age. My Lord, I seek Your protection from the torment of the Hell-fire and the punishment of the grave.",
            "We have entered the evening and at this very time the whole kingdom belongs to Allah, Lord of the Worlds. O Allah, I ask You for the goodness of this day/night: its victory, its help, its light, and its blessings and guidance. I seek Your protection from the evil that is in it and from the evil that follows it.",
            "O Allah, I have entered the evening, and I call upon You, the bearers of Your Throne, Your angels and all creation, to bear witness that surely You are Allah. There is no god worthy of worship except You Alone. You have no partners, and that Muḥammad ﷺ is Your slave and Your Messenger.",
            "O Allah, by You we have entered the evening and by You we enter upon the morning. By You, we live and we die, and to You is the resurrection/return.",
            "O Allah, grant me well-being in my body. O Allah, grant me well-being in my hearing. O Allah, grant me well-being in my sight. There is no god worthy of worship except You. O Allah, I seek Your protection from disbelief and poverty and I seek Your protection from the punishment of the grave. There is no god worthy of worship except You.",
            "Allah is sufficient for me. There is no god worthy of worship except Him. I have placed my trust in Him only and He is the Lord of the Magnificent Throne.",
            "I am pleased with Allah as my Lord, with Islām as my religion and with Muḥammad ﷺ as my Prophet.",
            "In the Name of Allah, with whose Name nothing can harm in the earth nor in the sky. He is The All-Hearing and All-Knowing.",
            "Allah is free from imperfection, and all praise is due to Him.",
            "There is no god worthy of worship except Allah. He is Alone and He has no partner whatsoever. To Him Alone belong all sovereignty and all praise. He is over all things All-Powerful.",
            "Allah is free from imperfection. All praise be to Allah. Allah is the Greatest.",
            "O Allah, honour and have mercy upon Muhammad and the family of Muhammad as You have honoured and had mercy upon Ibrāhīm and the family of Ibrāhīm. Indeed, You are the Most Praiseworthy, the Most Glorious. O Allah, bless Muhammad and the family of Muhammad as You have blessed Ibrāhīm and the family of Ibrāhīm. Indeed, You are the Most Praiseworthy, the Most Glorious.",
            "I seek protection in Allah’s perfect words from the evil of whatever He has created."

let currentCat = 0, currentIndex = 0, currentCount = 0, lang = 'ar';
let favs = JSON.parse(localStorage.getItem('azkarFavs')) || [];
const circleRadius = 38;
const circleCircumference = 2 * Math.PI * circleRadius;

window.onload = function() {
    autoTimeSelect();
    render();
};

function autoTimeSelect() {
    const hr = new Date().getHours();
    if (hr >= 5 && hr < 12) currentCat = 1;
    else if (hr >= 16 && hr < 20) currentCat = 2;
    else if (hr >= 20 || hr < 5) currentCat = 3;
    else currentCat = 0;
}

function render() {
    const isFavTab = currentCat === 4;
    const list = isFavTab ? favs : azkarData[currentCat].arabic;
    
    // Check if list is empty (only possible on fav tab)
    if (isFavTab && list.length === 0) {
        document.getElementById('arabicText').innerText = lang === 'ar' ? "قائمة المفضلات فارغة" : "Favorites list is empty";
        document.getElementById('translationText').innerText = "";
        document.getElementById('progressVal').innerText = "0 / 0";
        document.getElementById('repeatVal').innerText = "";
        document.getElementById('circleCount').innerText = "0";
        document.getElementById('favToggle').style.display = 'none';
    } else {
        const catObj = isFavTab ? favs[currentIndex] : { 
            arabic: azkarData[currentCat].arabic[currentIndex], 
            trans: azkarData[currentCat].trans[currentIndex],
            reps: azkarData[currentCat].reps[currentIndex]
        };
        
        document.getElementById('arabicText').innerText = catObj.arabic;
        document.getElementById('translationText').innerText = catObj.trans;
        document.getElementById('progressVal').innerText = `${currentIndex + 1} / ${list.length}`;
        document.getElementById('repeatVal').innerText = getRepText(catObj.reps);
        document.getElementById('circleCount').innerText = currentCount;
        document.getElementById('favToggle').style.display = 'block';
        
        // Update Favorite Button State
        const isCurrentFav = favs.some(f => f.arabic === catObj.arabic);
        document.getElementById('favToggle').classList.toggle('active', isCurrentFav);
        document.getElementById('favToggle').setAttribute('data-tooltip', isCurrentFav ? (lang === 'ar' ? 'إزالة من المفضلات' : 'Remove from Favorites') : (lang === 'ar' ? 'إضافة للمفضلات' : 'Add to Favorites'));
        
        updateCircle(currentCount, catObj.reps);
    }

    // Translate UI
    const uiAr = { prog: "التقدم", rep: "التكرار", col: "الألوان", set: "الإعدادات", s1: "صوت النقرة", s2: "اهتزاز", s3: "حجم الخط", t0: "الاستيقاظ", t1: "الصباح", t2: "المساء", t3: "النوم", t4: "المفضلة", copy: "نسخ النص", ref: "تحديث", share: "مشاركة" };
    const uiEn = { prog: "PROGRESS", rep: "REPEAT", col: "Colors", set: "Settings", s1: "Click Sound", s2: "Vibration", s3: "Font Size", t0: "Waking", t1: "Morning", t2: "Evening", t3: "Sleep", t4: "Favs", copy: "Copy Text", ref: "Refresh", share: "Share" };
    const ui = lang === 'ar' ? uiAr : uiEn;

    document.getElementById('lblProg').innerText = ui.prog;
    document.getElementById('lblRep').innerText = ui.rep;
    document.getElementById('mCol').innerText = ui.col;
    document.getElementById('mSet').innerText = ui.set;
    document.getElementById('s1').innerText = ui.s1;
    document.getElementById('s2').innerText = ui.s2;
    document.getElementById('s3').innerText = ui.s3;
    document.getElementById('btnCopy').setAttribute('data-tooltip', ui.copy);
    document.getElementById('btnRef').setAttribute('data-tooltip', ui.ref);
    document.getElementById('btnShare').setAttribute('data-tooltip', ui.share);
    
    for(let i=0; i<5; i++) document.getElementById('t'+i).innerText = ui['t'+i];

    // Restore Quick Color Names on Hover
    document.querySelectorAll('.color-dot').forEach(dot => {
        dot.title = lang === 'ar' ? dot.getAttribute('data-ar') : dot.getAttribute('data-en');
    });

    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === currentCat));
}

function updateCircle(count, max) {
    const ring = document.getElementById('progressRing');
    const cont = document.getElementById('counterCont');
    const offset = circleCircumference - ((count / max) * circleCircumference);
    ring.style.strokeDasharray = `${circleCircumference} ${circleCircumference}`;
    ring.style.strokeDashoffset = offset;
    cont.classList.toggle('completed', count === max);
}

function getRepText(c) {
    if (lang === 'en') return c === 1 ? "1 Time" : c + " Times";
    const map = {1:"مرة واحدة", 2:"مرتان", 3:"٣ مرات", 33:"٣٣ مرة", 34:"٣٤ مرة", 100:"١٠٠ مرة"};
    return map[c] || c + " مرات";
}

function increment() {
    const list = currentCat === 4 ? favs : azkarData[currentCat].arabic;
    if (list.length === 0) return;
    const max = currentCat === 4 ? favs[currentIndex].reps : azkarData[currentCat].reps[currentIndex];
    if (currentCount < max) {
        currentCount++;
        playTap();
        render();
        if (currentCount === max) {
            playVib();
            // Optional: next() if auto-transfer checked
        }
    }
}

function next() { 
    const list = currentCat === 4 ? favs : azkarData[currentCat].arabic;
    if (list.length === 0) return;
    currentIndex = (currentIndex + 1) % list.length; currentCount = 0; render(); 
}
function prev() { 
    const list = currentCat === 4 ? favs : azkarData[currentCat].arabic;
    if (list.length === 0) return;
    currentIndex = (currentIndex - 1 + list.length) % list.length; currentCount = 0; render(); 
}
function changeCat(i) { currentCat = i; currentIndex = 0; currentCount = 0; render(); }
function toggleLang() { lang = (lang === 'ar' ? 'en' : 'ar'); document.getElementById('bodyNode').className = 'lang-' + lang; render(); }

function toggleFavorite() {
    const current = { 
        arabic: azkarData[currentCat].arabic[currentIndex], 
        trans: azkarData[currentCat].trans[currentIndex],
        reps: azkarData[currentCat].reps[currentIndex]
    };
    const idx = favs.findIndex(f => f.arabic === current.arabic);
    if(idx > -1) favs.splice(idx, 1);
    else favs.push(current);
    localStorage.setItem('azkarFavs', JSON.stringify(favs));
    if (currentCat === 4) { currentIndex = 0; currentCount = 0; }
    render();
}

function doCopy() {
    const text = (lang === 'ar') ? document.getElementById('arabicText').innerText : document.getElementById('translationText').innerText;
    navigator.clipboard.writeText(text);
    const btn = document.getElementById('btnCopy');
    btn.innerHTML = '<span style="font-size:16px">✅</span>';
    setTimeout(() => btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>', 1000);
}

function shareTo(p) {
    const text = encodeURIComponent(document.getElementById('arabicText').innerText);
    const urls = {
        tw: `https://twitter.com/intent/tweet?text=${text}`,
        fb: `https://www.facebook.com/sharer/sharer.php?u=${window.location.href}`,
        wa: `https://wa.me/?text=${text}`,
        tg: `https://t.me/share/url?url=${window.location.href}&text=${text}`
    };
    window.open(urls[p], '_blank');
}

function toggleMenu() { document.getElementById('menu').classList.toggle('show'); }
function toggleShare() { 
    const sm = document.getElementById('shareMenu');
    sm.style.display = sm.style.display === 'block' ? 'none' : 'block';
}

function applyTheme(bg, acc, el) {
    document.documentElement.style.setProperty('--bg', bg);
    document.documentElement.style.setProperty('--accent', acc);
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
    el.classList.add('active');
}

function setFs(v) { document.documentElement.style.setProperty('--base-font-size', v + 'px'); }

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTap() {
    if(!document.getElementById('chkClick').checked) return;
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.frequency.setValueAtTime(600, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.1);
}
function playVib() {
    if(!document.getElementById('chkVibrate').checked) return;
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'square'; o.frequency.setValueAtTime(120, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.4);
}

function changeIcon() {
    const gallery = ["https://cdn-icons-png.flaticon.com/128/4354/4354959.png","https://cdn-icons-png.flaticon.com/128/13773/13773984.png"];
    const img = document.getElementById('cycleIcon');
    img.src = img.src.includes('13773') ? gallery[0] : gallery[1];
}
</script>
