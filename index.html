<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azkar Master Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1E122C;
            --accent: #7446A0;
            --card: rgba(255, 255, 255, 0.05);
            --text: #FFFFFF;
            --text-dim: #B1A2C1;
            --circle-border: rgba(255,255,255,0.3);
        }

        body {
            background: #121212;
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
        }

        .widget {
            width: 95%; max-width: 450px; height: 90vh;
            background-color: var(--bg);
            border-radius: 24px; padding: 20px;
            display: flex; flex-direction: column;
            position: relative; box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.4s ease;
        }

        /* Tabs */
        .tabs {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 8px; margin-bottom: 20px;
        }
        .tab {
            background: var(--card); border: none; color: var(--text-dim);
            padding: 12px 0; border-radius: 12px; cursor: pointer;
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            transition: 0.3s;
        }
        .tab.active { background: var(--accent); color: white; }

        /* Content Area */
        .main-display {
            flex-grow: 1; overflow-y: auto; padding: 10px;
            text-align: center; display: flex; flex-direction: column;
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent;
        }
        .arabic {
            font-family: 'Amiri', serif; font-size: 26px; color: var(--text);
            direction: rtl; line-height: 1.8; margin-bottom: 20px;
        }
        .divider {
            height: 1px; background: rgba(255,255,255,0.1);
            width: 80%; margin: 0 auto 20px;
        }
        .translation {
            font-size: 15px; color: var(--text-dim); line-height: 1.6;
            margin-bottom: 30px; font-weight: 400;
        }

        /* NEW COUNTER SYSTEM */
        .footer-controls {
            display: flex; justify-content: space-between; align-items: center;
            padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .side-info {
            flex: 1; display: flex; flex-direction: column; align-items: center;
        }
        .info-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        .info-value { font-size: 16px; color: var(--text); font-weight: 700; font-family: monospace; }
        .arabic-label { font-family: 'Amiri', serif; font-size: 16px; color: #ff7b54; }

        .counter-circle {
            width: 70px; height: 70px; border-radius: 50%;
            border: 4px solid var(--circle-border);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 700; color: var(--text);
            cursor: pointer; transition: 0.2s; background: var(--card);
        }
        .counter-circle:active { transform: scale(0.9); background: var(--accent); }

        .nav-btn {
            background: none; border: none; color: var(--text-dim);
            font-size: 24px; cursor: pointer; padding: 10px;
        }

        /* Color Menu */
        .palette-trigger {
            position: absolute; top: 15px; right: 15px; background: none; border: none; cursor: pointer; font-size: 20px;
        }
        .color-menu {
            position: absolute; top: 50px; right: 20px;
            background: #1A1A1A; padding: 12px; border-radius: 12px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            visibility: hidden; opacity: 0; transition: 0.3s; z-index: 100;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .color-menu.show { visibility: visible; opacity: 1; }
        .color-dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); }

        .main-display::-webkit-scrollbar { width: 4px; }
        .main-display::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="widget">
    <button class="palette-trigger" onclick="toggleColors()">🎨</button>
    
    <div class="tabs">
        <button class="tab active" onclick="changeCat(0)">Morning</button>
        <button class="tab" onclick="changeCat(1)">Evening</button>
        <button class="tab" onclick="changeCat(2)">Sleep</button>
        <button class="tab" onclick="changeCat(3)">Wake Up</button>
    </div>

    <div class="main-display" id="scrollArea">
        <div class="arabic" id="arabicText"></div>
        <div class="divider"></div>
        <div class="translation" id="translationText"></div>
    </div>

    <div class="footer-controls">
        <button class="nav-btn" onclick="prev()">❮</button>
        
        <!-- Left Side: Progress in Category -->
        <div class="side-info">
            <span class="info-label">Progress</span>
            <span class="info-value" id="progressVal">1 / 26</span>
        </div>

        <!-- Middle: Repetition Counter -->
        <div class="counter-circle" id="circleCount" onclick="decrementCount()">0</div>

        <!-- Right Side: How many times for current zikr -->
        <div class="side-info">
            <span class="info-label">Repeat</span>
            <span class="arabic-label" id="repeatVal">مرة واحدة</span>
        </div>

        <button class="nav-btn" onclick="next()">❯</button>
    </div>

    <!-- Color Menu with 12 Colors from screenshot -->
    <div class="color-menu" id="colorMenu">
        <div class="color-dot" style="background:#4D1D3D" onclick="applyTheme('#4D1D3D', '#9B3675')"></div>
        <div class="color-dot" style="background:#1E122C" onclick="applyTheme('#1E122C', '#7446A0')"></div>
        <div class="color-dot" style="background:#3B1414" onclick="applyTheme('#3B1414', '#992E2E')"></div>
        <div class="color-dot" style="background:#3E2723" onclick="applyTheme('#3E2723', '#8D6E63')"></div>
        <div class="color-dot" style="background:#827717" onclick="applyTheme('#827717', '#C0CA33')"></div>
        <div class="color-dot" style="background:#1B5E20" onclick="applyTheme('#1B5E20', '#4CAF50')"></div>
        <div class="color-dot" style="background:#006064" onclick="applyTheme('#006064', '#00ACC1')"></div>
        <div class="color-dot" style="background:#0D47A1" onclick="applyTheme('#0D47A1', '#42A5F5')"></div>
        <div class="color-dot" style="background:#263238" onclick="applyTheme('#263238', '#78909C')"></div>
        <div class="color-dot" style="background:#424242" onclick="applyTheme('#424242', '#BDBDBD')"></div>
        <div class="color-dot" style="background:#000000" onclick="applyTheme('#000000', '#555555')"></div>
        <div class="color-dot" style="background:#FFFFFF" onclick="applyTheme('#FFFFFF', '#E0E0E0', true)"></div>
    </div>
</div>

let currentCat = 0;

function render() {
    const category = azkarData[currentCat];

    document.getElementById('arabicText').innerText = itemArabic;
    document.getElementById('translationText').innerText = itemTrans;
    document.getElementById('progressVal').innerText = `${currentIndex + 1} / ${category.arabic.length}`;
    
    // Arabic translation for the "Repeat" label
    const arabicWords = ["مرة واحدة", "مرتان", "٣ مرات", "٤ مرات", "٧ مرات", "١٠ مرات", "٣٣ مرة", "٣٤ مرة", "١٠٠ مرة"];

    if(totalReps === 1) repLabel = "مرة واحدة";
    if(totalReps === 3) repLabel = "٣ مرات";
    if(totalReps === 4) repLabel = "٤ مرات";
    if(totalReps === 7) repLabel = "٧ مرات";
    if(totalReps === 10) repLabel = "١٠ مرات";
    if(totalReps === 33) repLabel = "٣٣ مرة";
    if(totalReps === 34) repLabel = "٣٤ مرة";
    if(totalReps >= 100) repLabel = "١٠٠ مرة";

    document.getElementById('repeatVal').innerText = repLabel;

    // Reset circle count when zikr changes
    if (remainingReps <= 0) {
        remainingReps = totalReps;
    }
    document.getElementById('circleCount').innerText = remainingReps;
    document.getElementById('scrollArea').scrollTop = 0;
}

function decrementCount() {
    if (remainingReps > 1) {
        remainingReps--;
        document.getElementById('circleCount').innerText = remainingReps;
    } else {
        next(); // Auto move to next when finished
    }
}

function changeCat(index) {
    currentCat = index;
    currentIndex = 0;
    remainingReps = 0;
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
    render();
}

function next() {
    currentIndex = (currentIndex + 1) % azkarData[currentCat].arabic.length;
    remainingReps = 0;
    render();
}

function prev() {
    currentIndex = (currentIndex - 1 + azkarData[currentCat].arabic.length) % azkarData[currentCat].arabic.length;
    remainingReps = 0;
    render();
}

function toggleColors() {
    document.getElementById('colorMenu').classList.toggle('show');
}

function applyTheme(bg, acc, isWhite = false) {
    document.documentElement.style.setProperty('--bg', bg);
    document.documentElement.style.setProperty('--accent', acc);
    document.documentElement.style.setProperty('--text', isWhite ? '#1E122C' : '#FFFFFF');
    document.documentElement.style.setProperty('--text-dim', isWhite ? '#4A4A4A' : '#B1A2C1');
    document.documentElement.style.setProperty('--circle-border', isWhite ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.3)');
    document.getElementById('colorMenu').classList.remove('show');
}

// Initial Render
render();
</script>

</body>
</html>
