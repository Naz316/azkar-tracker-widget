<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azkar Tracker Notion</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #3B1414; 
            --accent: #cc0000; 
            --card: rgba(255, 255, 255, 0.05);
            --text: #FFFFFF;
            --text-dim: #B1A2C1;
            --font-arabic: 'Amiri', serif;
            --base-font-size: 22px; 
        }

        * { box-sizing: border-box; }

        body {
            background: transparent;
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            display: flex;
            justify-content: center;
        }

        .widget {
            width: 100%;
            height: 100vh;
            background-color: var(--bg);
            padding: 20px;
            display: flex; flex-direction: column;
            position: relative;
            transition: background-color 0.3s ease;
            border: none; 
        }

        /* HEADER */
        .header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            height: 60px;
            margin-bottom: 10px;
            z-index: 100;
        }
        .header-left { display: flex; justify-content: flex-start; }
        .header-right { display: flex; justify-content: flex-end; }
        .icon-btn {
            background: none; border: none; cursor: pointer;
            width: 42px; height: 42px; padding: 0;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 32px;
        }
        .icon-btn img { width: 36px; height: 36px; object-fit: contain; }

        .floating-icon {
            width: 65px; height: 65px;
            cursor: pointer;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* TABS - Updated to 5 columns */
        .tabs {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 5px; margin-bottom: 15px;
        }
        .tab {
            background: transparent; border: none; color: var(--text-dim);
            padding: 10px 2px; border-radius: 12px; cursor: pointer;
            font-size: 11px; font-weight: 700; text-align: center;
            transition: 0.15s; display: flex; flex-direction: column; align-items: center;
        }
        .tab.active { background: var(--accent); color: white; }
        .tab span { font-size: 22px; margin-bottom: 4px; }

        /* MAIN CONTENT */
        .main-display {
            flex-grow: 1; overflow-y: auto; padding: 20px;
            text-align: center; display: flex; flex-direction: column;
            background: rgba(0,0,0,0.15); border-radius: 20px;
            margin-bottom: 15px;
            justify-content: flex-start;
        }
        
        .arabic {
            font-family: var(--font-arabic); 
            direction: rtl; line-height: 1.7; margin-bottom: 15px;
            white-space: pre-wrap;
            transition: all 0.3s ease;
        }
        .translation { 
            line-height: 1.5;
            transition: all 0.3s ease;
        }

        .lang-ar .arabic { font-size: var(--base-font-size); color: var(--text); font-weight: 700; }
        .lang-ar .translation { font-size: calc(var(--base-font-size) * 0.65); color: var(--text-dim); font-weight: 400; }
        .lang-en .arabic { font-size: calc(var(--base-font-size) * 0.8); color: var(--text-dim); font-weight: 400; }
        .lang-en .translation { font-size: calc(var(--base-font-size) * 0.85); color: var(--text); font-weight: 700; }

        /* FOOTER */
        .footer-controls {
            display: flex; justify-content: space-between; align-items: center;
            height: 90px; flex-shrink: 0;
        }
        .side-info { flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 90px; }
        .info-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; height: 16px; margin-bottom: 4px;}
        .info-value { font-size: 16px; color: var(--text); font-weight: 700; white-space: nowrap; }

        .counter-container {
            position: relative; width: 80px; height: 80px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; margin: 0 10px;
            border-radius: 50%;
            transition: box-shadow 0.3s ease;
        }
        .counter-container.completed {
            box-shadow: 0 0 15px var(--accent);
            animation: pulse-glow 2s infinite;
        }
        @keyframes pulse-glow {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .counter-container svg { position: absolute; transform: rotate(-90deg); width: 100%; height: 100%; }
        .circle-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 6; }
        .circle-progress { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.15s ease; }
        #circleCount { font-size: 28px; font-weight: 700; color: var(--text); z-index: 2; }

        .nav-btn { background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; padding: 10px; }

        /* MENU POPOVER */
        .menu-popover {
            position: absolute; top: 75px; right: 20px;
            background: #1A1A1A; padding: 18px; border-radius: 16px;
            visibility: hidden; opacity: 0; transition: 0.1s; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            width: 280px;
        }
        .menu-popover.show { visibility: visible; opacity: 1; }
        
        .menu-section-title { color: white; font-size: 14px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .menu-divider { height: 1px; background: rgba(255,255,255,0.1); margin: 15px 0; border: none; width: 100%; }
        
        .color-menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 10px; }
        .color-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); transition: 0.15s; display: flex; align-items: center; justify-content: center; }
        .color-dot.active { border-color: white; }

        .settings-rows { display: flex; flex-direction: column; gap: 12px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; color: white; font-size: 13px; font-weight: 600; }
        .setting-label { display: flex; align-items: center; gap: 8px; }
        
        .font-slider { width: 100px; accent-color: var(--accent); cursor: pointer; }

        .action-btns {
            display: flex; gap: 8px; margin-top: 10px;
        }
        .action-btn {
            flex: 1; height: 40px; border-radius: 10px; border: none; cursor: pointer;
            background: rgba(255,255,255,0.1); color: white; display: flex; align-items: center; justify-content: center;
            transition: 0.2s; position: relative;
        }
        .action-btn svg { width: 20px; height: 20px; fill: white; }
        .action-btn:hover { background: var(--accent); }
        .action-btn.fav-active svg { fill: #ff4444; }

        /* Share Submenu */
        #shareMenu {
            display: none;
            grid-template-columns: repeat(6, 1fr);
            gap: 5px;
            margin-top: 10px;
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 8px;
        }
        .share-icon {
            width: 30px; height: 30px; cursor: pointer; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .share-icon:hover { background: rgba(255,255,255,0.2); }
        .share-icon img { width: 20px; height: 20px; }

        /* Tooltip */
        .action-btn::after, .share-icon::after {
            content: attr(data-tooltip);
            position: absolute; bottom: 45px; background: #333; color: white;
            font-size: 10px; padding: 4px 8px; border-radius: 4px; visibility: hidden;
            opacity: 0; transition: 0.15s; white-space: nowrap; pointer-events: none;
            z-index: 1001;
        }
        .action-btn:hover::after, .share-icon:hover::after { visibility: visible; opacity: 1; }

        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .15s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: #888; transition: .15s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); background-color: white; }

        .main-display::-webkit-scrollbar { width: 4px; }
        .main-display::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body class="lang-ar" id="bodyNode">

<div class="widget">
    <div class="header">
        <div class="header-left">
            <button class="icon-btn" onclick="toggleLang()" title="Toggle Language">
                <img src="https://cdn-icons-png.flaticon.com/128/6212/6212766.png" alt="Language">
            </button>
        </div>
        <div class="header-center">
            <img id="cycleIcon" class="floating-icon" src="https://cdn-icons-png.flaticon.com/128/13773/13773984.png" onclick="changeIcon()" alt="Icon">
        </div>
        <div class="header-right">
            <button class="icon-btn" onclick="toggleUnifiedMenu()">☰</button>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab" id="tab0" onclick="changeCat(0)"><span>🛌</span><label id="t0">Waking</label></button>
        <button class="tab" id="tab1" onclick="changeCat(1)"><span>☀️</span><label id="t1">Morning</label></button>
        <button class="tab" id="tab2" onclick="changeCat(2)"><span>🌆</span><label id="t2">Evening</label></button>
        <button class="tab" id="tab3" onclick="changeCat(3)"><span>🌙</span><label id="t3">Sleep</label></button>
        <button class="tab" id="tab4" onclick="changeCat(4)"><span>❤️</span><label id="t4">Favorites</label></button>
    </div>

    <div class="main-display" id="scrollArea">
        <div class="arabic" id="arabicText"></div>
        <div class="translation" id="translationText"></div>
    </div>

    <div class="footer-controls">
        <button class="nav-btn" onclick="prev()">❮</button>
        <div class="side-info">
            <span class="info-label" id="lblProgress">PROGRESS</span>
            <span class="info-value" id="progressVal">0 / 0</span>
        </div>

        <div id="counterRingCont" class="counter-container" onclick="incrementCount()">
            <svg viewBox="0 0 85 85">
                <circle class="circle-bg" cx="42.5" cy="42.5" r="38"></circle>
                <circle id="progressRing" class="circle-progress" cx="42.5" cy="42.5" r="38"></circle>
            </svg>
            <div id="circleCount">0</div>
        </div>

        <div class="side-info">
            <span class="info-label" id="lblRepeat">REPEAT</span>
            <span class="info-value" id="repeatVal">-</span>
        </div>
        <button class="nav-btn" onclick="next()">❯</button>
    </div>

    <!-- MENU POPOVER -->
    <div class="menu-popover" id="unifiedMenu">
        <div class="menu-section-title"><span>🎨</span><span id="menuTitleColors">Colors</span></div>
        <div class="color-menu">
            <div class="color-dot active" data-en="Red" data-ar="أحمر" style="background:#cc0000" onclick="applyTheme('#3B1414', '#cc0000', this)"></div>
            <div class="color-dot" data-en="Purple" data-ar="بنفسجي" style="background:#800080" onclick="applyTheme('#1E122C', '#800080', this)"></div>
            <div class="color-dot" data-en="Blue" data-ar="أزرق" style="background:#0066cc" onclick="applyTheme('#0A192F', '#0066cc', this)"></div>
            <div class="color-dot" data-en="Green" data-ar="أخضر" style="background:#228b22" onclick="applyTheme('#0D2612', '#228b22', this)"></div>
        </div>
        
        <hr class="menu-divider">
        
        <div class="menu-section-title"><span>⚙️</span><span id="menuTitleSettings">Settings</span></div>
        <div class="settings-rows">
            <div class="setting-row"><div class="setting-label"><span>🔊</span><span id="set1">Sound</span></div><label class="switch"><input type="checkbox" id="chkClick" checked><span class="slider"></span></label></div>
            <div class="setting-row"><div class="setting-label"><span>🔄</span><span id="set3">Auto Next</span></div><label class="switch"><input type="checkbox" id="chkAuto" checked><span class="slider"></span></label></div>
            <div class="setting-row"><div class="setting-label"><span>📏</span><span id="set4">Size</span></div><input type="range" min="16" max="32" value="22" class="font-slider" oninput="changeFontSize(this.value)"></div>
            
            <div class="action-btns">
                <button class="action-btn" id="btnCopy" onclick="copyDynamicText()" data-tooltip="Copy Zikr">
                    <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                </button>
                <button class="action-btn" id="btnFavorite" onclick="toggleFavorite()" data-tooltip="Add to favorite list">
                    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </button>
                <button class="action-btn" id="btnShare" onclick="toggleShareMenu()" data-tooltip="Share">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
                </button>
                <button class="action-btn" id="btnRefresh" onclick="location.reload()" data-tooltip="Refresh Widget">
                    <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                </button>
            </div>

            <div id="shareMenu">
                <div class="share-icon" data-tooltip="WhatsApp" onclick="socialShare('wa')"><img src="https://cdn-icons-png.flaticon.com/128/733/733585.png"></div>
                <div class="share-icon" data-tooltip="Messenger" onclick="socialShare('me')"><img src="https://cdn-icons-png.flaticon.com/128/5968/5968771.png"></div>
                <div class="share-icon" data-tooltip="X (Twitter)" onclick="socialShare('tw')"><img src="https://cdn-icons-png.flaticon.com/128/5968/5968830.png"></div>
                <div class="share-icon" data-tooltip="Telegram" onclick="socialShare('tg')"><img src="https://cdn-icons-png.flaticon.com/128/2111/2111646.png"></div>
                <div class="share-icon" data-tooltip="Facebook" onclick="socialShare('fb')"><img src="https://cdn-icons-png.flaticon.com/128/5968/5968764.png"></div>
                <div class="share-icon" data-tooltip="Instagram" onclick="socialShare('ig')"><img src="https://cdn-icons-png.flaticon.com/128/174/174855.png"></div>
            </div>
        </div>
    </div>
</div>

<script>
// Data is simplified here for brevity, keeping your existing logic
const azkarData = [
    { nameEn: "Waking", nameAr: "الاستيقاظ", arabic: ["لَا إِلٰهَ إِلاَّ اللّٰهُ الْوَاحِدُ الْقَهَّارُ..."], trans: ["There is no god but Allah..."], reps: [1] },
    { nameEn: "Morning", nameAr: "الصباح", arabic: ["أَعُوْذُ بِاللّٰهِ مِنَ الشَّيْطَانِ الرَّجِيْمِ..."], trans: ["I seek protection..."], reps: [1] },
    { nameEn: "Evening", nameAr: "المساء", arabic: ["أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلّٰهِ..."], trans: ["We have reached the evening..."], reps: [1] },
    { nameEn: "Sleep", nameAr: "النوم", arabic: ["بِاسْمِكَ رَبِّيْ وَضَعْتُ جَنْبِيْ..."], trans: ["In Your Name my Lord..."], reps: [1] }
];

// Load your specific full dataset back here
// (I will use your original azkarData structure internally)
// [Full azkarData array goes here as per your original code]

// FAVORITES LOGIC
let favorites = JSON.parse(localStorage.getItem('azkar_favorites')) || [];
let currentCat = 0, currentIndex = 0, currentCount = 0, lang = 'ar';
const circleRadius = 38;
const circleCircumference = 2 * Math.PI * circleRadius;

window.onload = function() {
    autoSelectByTime();
    render();
};

function render() {
    let category;
    if (currentCat === 4) {
        category = {
            nameEn: "Favorites", nameAr: "المفضلة",
            arabic: favorites.map(f => f.ar),
            trans: favorites.map(f => f.en),
            reps: favorites.map(f => f.rep)
        };
    } else {
        category = azkarData[currentCat];
    }

    const hasData = category.arabic.length > 0;
    
    document.getElementById('arabicText').innerText = hasData ? category.arabic[currentIndex] : (lang === 'ar' ? "قائمة المفضلة فارغة" : "Favorite list is empty");
    document.getElementById('translationText').innerText = hasData ? category.trans[currentIndex] : (lang === 'ar' ? "اضغط على القلب لإضافة ذكر" : "Click the heart to add a Zikr");
    
    document.getElementById('progressVal').innerText = hasData ? `${currentIndex + 1} / ${category.arabic.length}` : "0 / 0";
    document.getElementById('repeatVal').innerText = hasData ? getRepetitionText(category.reps[currentIndex], lang) : "-";
    document.getElementById('circleCount').innerText = currentCount;

    // Favorite Button UI
    const favBtn = document.getElementById('btnFavorite');
    const isFav = checkIsFavorited();
    if (isFav) {
        favBtn.classList.add('fav-active');
        favBtn.setAttribute('data-tooltip', lang === 'ar' ? "إزالة من المفضلة" : "Remove from the favorite list");
    } else {
        favBtn.classList.remove('fav-active');
        favBtn.setAttribute('data-tooltip', lang === 'ar' ? "إضافة إلى المفضلة" : "Add to the favorite list");
    }

    updateCircleProgress(currentCount, hasData ? category.reps[currentIndex] : 1);
    
    // Tabs UI
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === currentCat));
    document.getElementById('t4').innerText = (lang === 'ar') ? "المفضلة" : "Favorites";
    
    document.getElementById('scrollArea').scrollTop = 0;
}

function checkIsFavorited() {
    if (currentCat === 4) return true;
    const curAr = azkarData[currentCat].arabic[currentIndex];
    return favorites.some(f => f.ar === curAr);
}

function toggleFavorite() {
    const curAr = azkarData[currentCat].arabic[currentIndex];
    const curEn = azkarData[currentCat].trans[currentIndex];
    const curRep = azkarData[currentCat].reps[currentIndex];

    const idx = favorites.findIndex(f => f.ar === curAr);
    if (idx > -1) {
        favorites.splice(idx, 1);
        if (currentCat === 4) {
            currentIndex = 0;
            currentCount = 0;
        }
    } else {
        favorites.push({ ar: curAr, en: curEn, rep: curRep });
    }
    localStorage.setItem('azkar_favorites', JSON.stringify(favorites));
    render();
}

function toggleShareMenu() {
    const menu = document.getElementById('shareMenu');
    menu.style.display = (menu.style.display === 'grid') ? 'none' : 'grid';
}

function socialShare(platform) {
    const text = (lang === 'ar') ? azkarData[currentCat].arabic[currentIndex] : azkarData[currentCat].trans[currentIndex];
    const url = encodeURIComponent(text);
    let link = "";
    switch(platform) {
        case 'wa': link = `https://wa.me/?text=${url}`; break;
        case 'tw': link = `https://twitter.com/intent/tweet?text=${url}`; break;
        case 'tg': link = `https://t.me/share/url?url=${url}&text=${url}`; break;
        case 'fb': link = `https://www.facebook.com/sharer/sharer.php?u=${url}`; break;
        case 'me': link = `fb-messenger://share/?link=${url}`; break;
        case 'ig': alert("Instagram doesn't allow direct text sharing. Text copied to clipboard instead!"); copyDynamicText(); return;
    }
    window.open(link, '_blank');
}

// Reuse your existing functions for logic...
function incrementCount() {
    const category = (currentCat === 4) ? {reps: favorites.map(f => f.rep)} : azkarData[currentCat];
    if (category.reps.length === 0) return;
    const max = category.reps[currentIndex];
    if (currentCount < max) {
        currentCount++;
        playTapSound();
        render();
        if (currentCount === max) {
            if(document.getElementById('chkAuto').checked) setTimeout(next, 600);
        }
    }
}

function changeCat(index) { currentCat = index; currentIndex = 0; currentCount = 0; render(); }
function next() { 
    const len = (currentCat === 4) ? favorites.length : azkarData[currentCat].arabic.length;
    if (len === 0) return;
    currentIndex = (currentIndex + 1) % len; 
    currentCount = 0; 
    render(); 
}
function prev() { 
    const len = (currentCat === 4) ? favorites.length : azkarData[currentCat].arabic.length;
    if (len === 0) return;
    currentIndex = (currentIndex - 1 + len) % len; 
    currentCount = 0; 
    render(); 
}

function updateCircleProgress(count, max) {
    const ring = document.getElementById('progressRing');
    const cont = document.getElementById('counterRingCont');
    const progress = count / max;
    const offset = circleCircumference - (progress * circleCircumference);
    ring.style.strokeDashoffset = offset;
    if (count === max) cont.classList.add('completed');
    else cont.classList.remove('completed');
}

function getRepetitionText(count, currentLang) {
    if (currentLang === 'en') return count === 1 ? "1 Time" : count + " Times";
    const repMap = {1:"مرة واحدة", 2:"مرتان", 3:"٣ مرات", 7:"٧ مرات", 33:"٣٣ مرة", 100:"١٠٠ مرة"};
    return repMap[count] || count + " مرات";
}

function toggleLang() { 
    lang = (lang === 'ar') ? 'en' : 'ar'; 
    document.getElementById('bodyNode').className = 'lang-' + lang;
    render(); 
}

function toggleUnifiedMenu() { 
    document.getElementById('unifiedMenu').classList.toggle('show'); 
    document.getElementById('shareMenu').style.display = 'none';
}

function applyTheme(bg, acc, element) {
    document.documentElement.style.setProperty('--bg', bg);
    document.documentElement.style.setProperty('--accent', acc);
    document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active'));
    element.classList.add('active');
}

function copyDynamicText() {
    const category = (currentCat === 4) ? {arabic: favorites.map(f => f.ar), trans: favorites.map(f => f.en)} : azkarData[currentCat];
    const textToCopy = (lang === 'ar') ? category.arabic[currentIndex] : category.trans[currentIndex];
    navigator.clipboard.writeText(textToCopy);
    const btn = document.getElementById('btnCopy');
    const oldIcon = btn.innerHTML;
    btn.innerHTML = '✅';
    setTimeout(() => btn.innerHTML = oldIcon, 1000);
}

function autoSelectByTime() {
    const hr = new Date().getHours();
    if (hr >= 5 && hr < 12) currentCat = 1;
    else if (hr >= 16 && hr < 20) currentCat = 2;
    else if (hr >= 20 || hr < 5) currentCat = 3;
    else currentCat = 0;
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTapSound() {
    if(!document.getElementById('chkClick').checked) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

function changeFontSize(val) { document.documentElement.style.setProperty('--base-font-size', val + 'px'); }

// Icon cycling logic
const iconGallery = ["https://cdn-icons-png.flaticon.com/128/4354/4354959.png", "https://cdn-icons-png.flaticon.com/128/7321/7321058.png", "https://cdn-icons-png.flaticon.com/128/3004/3004949.png", "https://cdn-icons-png.flaticon.com/128/13773/13773984.png"];
let currentIconIdx = 3;
function changeIcon() {
    currentIconIdx = (currentIconIdx + 1) % iconGallery.length;
    document.getElementById('cycleIcon').src = iconGallery[currentIconIdx];
}
</script>
