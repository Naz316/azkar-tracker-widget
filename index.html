<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azkar Tracker Notion</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #3B1414;
            --accent: #cc0000;
            --card: rgba(255, 255, 255, 0.05);
            --text: #FFFFFF;
            --text-dim: #B1A2C1;
            --font-arabic: 'Amiri', serif;
            --base-font-size: 22px; 
        }

        * { box-sizing: border-box; }
        body { background: transparent; font-family: 'Inter', sans-serif; margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; display: flex; justify-content: center; }

        .widget { width: 100%; height: 100vh; background-color: var(--bg); padding: 20px; display: flex; flex-direction: column; position: relative; transition: background-color 0.3s ease; border: none; }

        /* HEADER */
        .header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; height: 60px; margin-bottom: 10px; z-index: 100; }
        .header-left { display: flex; justify-content: flex-start; }
        .header-right { display: flex; justify-content: flex-end; }
        .icon-btn { background: none; border: none; cursor: pointer; width: 42px; height: 42px; padding: 0; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; }
        .icon-btn img { width: 36px; height: 36px; object-fit: contain; }

        .floating-icon { width: 65px; height: 65px; cursor: pointer; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        /* TABS */
        .tabs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 15px; }
        .tab { background: transparent; border: none; color: var(--text-dim); padding: 12px 2px; border-radius: 14px; cursor: pointer; font-size: 11px; font-weight: 700; text-align: center; transition: 0.15s; display: flex; flex-direction: column; align-items: center; }
        .tab.active { background: var(--accent); color: white; }
        .tab span { font-size: 22px; margin-bottom: 4px; }

        /* MAIN CONTENT */
        .main-display { flex-grow: 1; overflow-y: auto; padding: 20px; text-align: center; display: flex; flex-direction: column; background: rgba(0,0,0,0.15); border-radius: 20px; margin-bottom: 15px; justify-content: flex-start; position: relative; }
        .arabic { font-family: var(--font-arabic); direction: rtl; line-height: 1.7; margin-bottom: 15px; white-space: pre-wrap; transition: all 0.3s ease; }
        .translation { line-height: 1.5; transition: all 0.3s ease; }

        /* Typography Logic */
        .lang-ar .arabic { font-size: var(--base-font-size); color: var(--text); font-weight: 700; }
        .lang-ar .translation { font-size: calc(var(--base-font-size) * 0.65); color: var(--text-dim); font-weight: 400; }
        .lang-en .arabic { font-size: calc(var(--base-font-size) * 0.8); color: var(--text-dim); font-weight: 400; }
        .lang-en .translation { font-size: calc(var(--base-font-size) * 0.85); color: var(--text); font-weight: 700; }

        /* FOOTER */
        .footer-controls { display: flex; justify-content: space-between; align-items: center; height: 90px; flex-shrink: 0; }
        .side-info { flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 90px; }
        .info-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; height: 16px; margin-bottom: 4px;}
        .info-value { font-size: 14px; color: var(--text); font-weight: 700; white-space: nowrap; }

        .counter-container { position: relative; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin: 0 10px; border-radius: 50%; transition: 0.3s; }
        .counter-container.completed { box-shadow: 0 0 15px var(--accent); }
        .counter-container svg { position: absolute; transform: rotate(-90deg); width: 100%; height: 100%; }
        .circle-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 6; }
        .circle-progress { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.15s ease; }
        #circleCount { font-size: 28px; font-weight: 700; color: var(--text); z-index: 2; }
        .nav-btn { background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; padding: 10px; }

        /* MENU POPOVER */
        .menu-popover { position: absolute; top: 75px; right: 20px; background: #1A1A1A; padding: 18px; border-radius: 16px; visibility: hidden; opacity: 0; transition: 0.1s; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); width: 260px; }
        .menu-popover.show { visibility: visible; opacity: 1; }
        .menu-section-title { color: white; font-size: 14px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .menu-divider { height: 2px; background: rgba(255,255,255,0.3); margin: 0 0 15px 0; border: none; width: 100%; }
        
        .color-menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .color-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); transition: 0.15s; display: flex; align-items: center; justify-content: center; }
        .color-dot.active { border-color: white; }
        .color-dot.active::after { content: '✓'; color: white; font-size: 12px; font-weight: bold; }

        /* SETTINGS ELEMENTS */
        .settings-rows { display: flex; flex-direction: column; gap: 10px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; color: white; font-size: 13px; font-weight: 600; }
        .setting-label { display: flex; align-items: center; gap: 8px; }
        .font-slider { width: 90px; cursor: pointer; accent-color: var(--accent); }

        .action-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; position: relative; }
        .action-btn { background: var(--accent); border: none; border-radius: 10px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; transition: 0.2s; }
        .action-btn svg { width: 20px; height: 20px; fill: white; }
        .action-btn:hover { filter: brightness(1.2); }
        .action-btn.fav-active svg { fill: #ff4d4d; filter: drop-shadow(0 0 5px #ff4d4d); }

        /* Share Submenu */
        .share-menu { position: absolute; bottom: 50px; left: 0; right: 0; background: #222; border-radius: 12px; display: none; grid-template-columns: repeat(4, 1fr); padding: 10px; gap: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 1001; }
        .share-menu.show { display: grid; }
        .share-item { background: none; border: none; cursor: pointer; padding: 5px; display: flex; justify-content: center; }
        .share-item svg { width: 18px; height: 18px; fill: #ccc; }
        .share-item:hover svg { fill: white; }

        /* Tooltip */
        .action-btn::after { content: attr(data-tooltip); position: absolute; bottom: 48px; background: #333; color: white; font-size: 10px; padding: 5px 10px; border-radius: 5px; visibility: hidden; opacity: 0; transition: 0.15s; white-space: nowrap; pointer-events: none; z-index: 1002; }
        .action-btn:hover::after { visibility: visible; opacity: 1; }

        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .15s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: #888; transition: .15s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); background-color: white; }
        .main-display::-webkit-scrollbar { width: 4px; }
        .main-display::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>

let currentCat = 1, currentIndex = 0, currentCount = 0, lang = 'ar';
let favs = JSON.parse(localStorage.getItem('azkarFavs')) || [];
const circleRadius = 38;
const circleCircumference = 2 * Math.PI * circleRadius;

window.onload = function() {
    autoSelectByTime();
    render();
};

function autoSelectByTime() {
    const hr = new Date().getHours();
    if (hr >= 5 && hr < 12) currentCat = 1;
    else if (hr >= 16 && hr < 20) currentCat = 2;
    else if (hr >= 20 || hr < 5) currentCat = 3;
    else currentCat = 0;
}

function updateCircleProgress(count, max) {
    const ring = document.getElementById('progressRing');
    const offset = circleCircumference - ((count / max) * circleCircumference);
    ring.style.strokeDasharray = `${circleCircumference} ${circleCircumference}`;
    ring.style.strokeDashoffset = offset;
    document.getElementById('counterRingCont').classList.toggle('completed', count === max);
}

function getRepetitionText(count, currentLang) {
    if (currentLang === 'en') return count === 1 ? "1 Time" : count + " Times";
    const map = {1:"مرة واحدة", 2:"مرتان", 3:"٣ مرات", 4:"٤ مرات", 7:"٧ مرات", 10:"١٠ مرات", 33:"٣٣ مرة", 34:"٣٤ مرة", 100:"١٠٠ مرة"};
    return map[count] || count + " مرات";
}

function render() {
    let category, realCat, realIdx;
    if (currentCat === 4) {
        if (favs.length === 0) {
            document.getElementById('arabicText').innerText = lang === 'ar' ? "قائمة المفضلة فارغة" : "Favorites list is empty";
            document.getElementById('translationText').innerText = "";
            document.getElementById('repeatVal').innerText = "";
            document.getElementById('progressVal').innerText = "0/0";
            return;
        }
        const item = favs[currentIndex];
        realCat = item.c; realIdx = item.i;
        category = azkarData[realCat];
    } else {
        realCat = currentCat; realIdx = currentIndex;
        category = azkarData[currentCat];
    }

    document.getElementById('arabicText').innerText = category.arabic[realIdx];
    document.getElementById('translationText').innerText = category.trans[realIdx];
    document.getElementById('progressVal').innerText = `${currentIndex + 1} / ${currentCat === 4 ? favs.length : category.arabic.length}`;
    document.getElementById('repeatVal').innerText = getRepetitionText(category.reps[realIdx], lang);
    document.getElementById('circleCount').innerText = currentCount;
    
    // UI Translation
    const ui = {
        ar: { prog: "التقدم", rep: "التكرار", col: "الألوان", set: "الإعدادات", add: "إضافة للمفضلة", rem: "إزالة من المفضلة", cp: "نسخ النص", rf: "تحديث الأداة", fav: "المفضلة" },
        en: { prog: "PROGRESS", rep: "REPEAT", col: "Colors", set: "Settings", add: "Add to Favorites", rem: "Remove from Favorites", cp: "Copy Text", rf: "Refresh Widget", fav: "Favs" }
    }[lang];

    document.getElementById('lblProgress').innerText = ui.prog;
    document.getElementById('lblRepeat').innerText = ui.rep;
    document.getElementById('menuTitleColors').innerText = ui.col;
    document.getElementById('menuTitleSettings').innerText = ui.set;
    document.getElementById('t4').innerText = ui.fav;

    // Favorited Status
    const isFav = favs.some(f => f.c === realCat && f.i === realIdx);
    const favBtn = document.getElementById('btnFav');
    favBtn.classList.toggle('fav-active', isFav);
    favBtn.setAttribute('data-tooltip', isFav ? ui.rem : ui.add);
    document.getElementById('btnCopy').setAttribute('data-tooltip', ui.cp);
    document.getElementById('btnRefresh').setAttribute('data-tooltip', ui.rf);

    document.querySelectorAll('.color-dot').forEach(dot => {
        dot.title = lang === 'ar' ? dot.getAttribute('data-ar') : dot.getAttribute('data-en');
    });

    updateCircleProgress(currentCount, category.reps[realIdx]);
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === currentCat));
    for(let i=0; i<4; i++) document.getElementById('t'+i).innerText = (lang === 'ar') ? azkarData[i].nameAr : azkarData[i].nameEn;
    document.getElementById('scrollArea').scrollTop = 0;
}

function incrementCount() {
    let max;
    if (currentCat === 4) { if(favs.length === 0) return; max = azkarData[favs[currentIndex].c].reps[favs[currentIndex].i]; }
    else max = azkarData[currentCat].reps[currentIndex];

    if (currentCount < max) {
        currentCount++;
        playTapSound();
        render();
        if (currentCount === max) {
            playVibrateSound();
            if(document.getElementById('chkAuto').checked) setTimeout(next, 600);
        }
    }
}

function next() { 
    const len = currentCat === 4 ? favs.length : azkarData[currentCat].arabic.length;
    if(len === 0) return;
    currentIndex = (currentIndex + 1) % len; currentCount = 0; render(); 
}
function prev() { 
    const len = currentCat === 4 ? favs.length : azkarData[currentCat].arabic.length;
    if(len === 0) return;
    currentIndex = (currentIndex - 1 + len) % len; currentCount = 0; render(); 
}
function changeCat(index) { currentCat = index; currentIndex = 0; currentCount = 0; render(); }

function toggleLang() { 
    lang = (lang === 'ar') ? 'en' : 'ar'; 
    document.getElementById('bodyNode').className = 'lang-' + lang;
    render(); 
}

function changeFontSize(v) { document.documentElement.style.setProperty('--base-font-size', v + 'px'); }

function copyDynamicText() {
    let category = (currentCat === 4) ? azkarData[favs[currentIndex].c] : azkarData[currentCat];
    let idx = (currentCat === 4) ? favs[currentIndex].i : currentIndex;
    const txt = (lang === 'ar') ? category.arabic[idx] : category.trans[idx];
    navigator.clipboard.writeText(txt);
    const btn = document.getElementById('btnCopy');
    const old = btn.innerHTML;
    btn.innerHTML = '<span style="font-size:16px">✅</span>';
    setTimeout(() => btn.innerHTML = old, 1000);
}

function toggleFavorite() {
    let realC = (currentCat === 4) ? favs[currentIndex].c : currentCat;
    let realI = (currentCat === 4) ? favs[currentIndex].i : currentIndex;
    const idx = favs.findIndex(f => f.c === realC && f.i === realI);
    if (idx > -1) favs.splice(idx, 1);
    else favs.push({c: realC, i: realI});
    localStorage.setItem('azkarFavs', JSON.stringify(favs));
    if (currentCat === 4 && currentIndex >= favs.length) currentIndex = Math.max(0, favs.length - 1);
    render();
}

function socialShare(platform) {
    let category = (currentCat === 4) ? azkarData[favs[currentIndex].c] : azkarData[currentCat];
    let idx = (currentCat === 4) ? favs[currentIndex].i : currentIndex;
    const txt = category.arabic[idx];
    const url = "https://twitter.com/intent/tweet?text=";
    const apps = {
        tw: `https://twitter.com/intent/tweet?text=${encodeURIComponent(txt)}`,
        fb: `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(location.href)}`,
        wa: `https://api.whatsapp.com/send?text=${encodeURIComponent(txt)}`,
        tg: `https://t.me/share/url?url=${encodeURIComponent(location.href)}&text=${encodeURIComponent(txt)}`
    };
    window.open(apps[platform], '_blank');
}

function toggleUnifiedMenu() { document.getElementById('unifiedMenu').classList.toggle('show'); }

function applyTheme(bg, acc, element) {
    const root = document.documentElement;
    root.style.setProperty('--bg', bg);
    root.style.setProperty('--accent', acc);
    document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active'));
    element.classList.add('active');
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTapSound() {
    if(!document.getElementById('chkClick').checked) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}
function playVibrateSound() {
    if(!document.getElementById('chkVibrate').checked) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(120, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    if ("vibrate" in navigator) navigator.vibrate(200);
}

const iconGallery = ["https://cdn-icons-png.flaticon.com/128/4354/4354959.png", "https://cdn-icons-png.flaticon.com/128/7321/7321058.png", "https://cdn-icons-png.flaticon.com/128/3004/3004949.png", "https://cdn-icons-png.flaticon.com/128/6152/6152858.png", "https://cdn-icons-png.flaticon.com/128/13773/13773984.png"];
let currentIconIdx = 4;
function changeIcon() {
    currentIconIdx = (currentIconIdx + 1) % iconGallery.length;
    document.getElementById('cycleIcon').src = iconGallery[currentIconIdx];
}
