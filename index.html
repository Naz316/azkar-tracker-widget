<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azkar Master Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1E122C;
            --accent: #7446A0;
            --card: rgba(255, 255, 255, 0.05);
            --text: #FFFFFF;
            --text-dim: #B1A2C1;
            --font-arabic: 'Reem Kufi', serif;
        }

        body {
            background: #121212;
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
        }

        .widget {
            width: 95%; max-width: 500px; height: 85vh;
            background-color: var(--bg);
            border-radius: 32px; padding: 25px;
            display: flex; flex-direction: column;
            position: relative; box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            transition: background 0.4s ease;
        }

        /* HEADER - THREE COLUMN ALIGNMENT */
        .header {
            display: grid;
            grid-template-columns: 1fr auto 1fr; /* Left, Middle, Right */
            align-items: center;
            height: 70px;
            margin-bottom: 20px;
            z-index: 100;
        }

        .header-left { display: flex; justify-content: flex-start; align-items: center; }
        .header-right { display: flex; justify-content: flex-end; align-items: center; }

        .lang-btn {
            background: var(--card); border: 1px solid rgba(255,255,255,0.1);
            width: 42px; height: 42px; border-radius: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .lang-btn img { width: 24px; height: 24px; opacity: 0.9; }
        .lang-btn:hover { background: rgba(255,255,255,0.1); }

        .palette-btn { 
            background: none; border: none; cursor: pointer; font-size: 28px; 
            padding: 0; display: flex; align-items: center;
        }

        .floating-icon {
            width: 70px; 
            height: 70px;
            cursor: pointer;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.4));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* TABS (Waking Up First) */
        .tabs {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 8px; margin-bottom: 20px;
        }
        .tab {
            background: transparent; border: none; color: var(--text-dim);
            padding: 10px 2px; border-radius: 12px; cursor: pointer;
            font-size: 10px; font-weight: 700; text-align: center;
            transition: 0.3s; display: flex; flex-direction: column; align-items: center;
        }
        .tab.active { background: var(--accent); color: white; }
        .tab span { font-size: 20px; margin-bottom: 4px; }

        /* MAIN CONTENT */
        .main-display {
            flex-grow: 1; overflow-y: auto; padding: 20px;
            text-align: center; display: flex; flex-direction: column;
            justify-content: center;
            background: rgba(0,0,0,0.1); border-radius: 20px;
            margin-bottom: 15px;
        }
        
        .arabic {
            font-family: var(--font-arabic); font-size: 28px; color: var(--text);
            direction: rtl; line-height: 1.6; margin-bottom: 15px;
        }
        .translation { font-size: 17px; color: var(--text-dim); line-height: 1.5; }

        /* FOOTER - ALIGNED NO LINE */
        .footer-controls {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0;
        }

        .side-info {
            flex: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
        }
        .info-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .info-value { font-size: 15px; color: var(--text); font-weight: 700; }

        .counter-circle {
            width: 75px; height: 75px; border-radius: 50%;
            border: 3px solid var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 700; color: var(--text);
            cursor: pointer; background: var(--card);
            margin: 0 15px; flex-shrink: 0;
        }

        .nav-btn {
            background: none; border: none; color: var(--text);
            font-size: 22px; cursor: pointer; padding: 10px;
        }

        /* 12 COLORS MENU */
        .color-menu {
            position: absolute; top: 80px; right: 25px;
            background: #1A1A1A; padding: 15px; border-radius: 16px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            visibility: hidden; opacity: 0; transition: 0.3s; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .color-menu.show { visibility: visible; opacity: 1; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); position: relative; }
        .color-dot:hover::after {
            content: attr(data-name); position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            font-size: 10px; color: white; background: #333; padding: 4px 8px; border-radius: 4px; white-space: nowrap;
        }

        .main-display::-webkit-scrollbar { width: 4px; }
        .main-display::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="widget">
    <div class="header">
        <div class="header-left">
            <button class="lang-btn" onclick="toggleLang()" id="langBtn">
                <img src="https://cdn-icons-png.flaticon.com/128/6212/6212766.png" alt="Language">
            </button>
        </div>
        
        <div class="header-center">
            <img id="cycleIcon" class="floating-icon" 
                 src="https://cdn-icons-png.flaticon.com/128/4354/4354959.png" 
                 onclick="changeIcon()" alt="Icon">
        </div>

        <div class="header-right">
            <button class="palette-btn" onclick="toggleColors()">🎨</button>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab active" onclick="changeCat(0)">
            <span>🛌</span>
            <label id="t0">Waking</label>
        </button>
        <button class="tab" onclick="changeCat(1)">
            <span>☀️</span>
            <label id="t1">Morning</label>
        </button>
        <button class="tab" onclick="changeCat(2)">
            <span>🌆</span>
            <label id="t2">Evening</label>
        </button>
        <button class="tab" onclick="changeCat(3)">
            <span>🌙</span>
            <label id="t3">Sleep</label>
        </button>
    </div>

    <div class="main-display" id="scrollArea">
        <div class="arabic" id="arabicText"></div>
        <div class="translation" id="translationText"></div>
    </div>

    <div class="footer-controls">
        <button class="nav-btn" onclick="prev()">❮</button>
        
        <div class="side-info">
            <span class="info-label" id="lblProgress">PROGRESS</span>
            <span class="info-value" id="progressVal">1 / 3</span>
        </div>

        <div class="counter-circle" id="circleCount" onclick="incrementCount()">0</div>

        <div class="side-info">
            <span class="info-label" id="lblRepeat">REPEAT</span>
            <span class="info-value" id="repeatVal">1 Time</span>
        </div>

        <button class="nav-btn" onclick="next()">❯</button>
    </div>

    <div class="color-menu" id="colorMenu">
        <div class="color-dot" data-name="Red" style="background:#cc0000" onclick="applyTheme('#3B1414', '#cc0000')"></div>
        <div class="color-dot" data-name="Blue" style="background:#0066cc" onclick="applyTheme('#0A192F', '#0066cc')"></div>
        <div class="color-dot" data-name="Brown" style="background:#663300" onclick="applyTheme('#2D1B0D', '#8B4513')"></div>
        <div class="color-dot" data-name="Yellow" style="background:#ffcc00" onclick="applyTheme('#332B00', '#ffcc00')"></div>
        <div class="color-dot" data-name="Black" style="background:#000000" onclick="applyTheme('#000000', '#444444')"></div>
        <div class="color-dot" data-name="Gray" style="background:#808080" onclick="applyTheme('#222222', '#808080')"></div>
        <div class="color-dot" data-name="Cloud" style="background:#ffffff" onclick="applyTheme('#f5f5f5', '#7446A0', true)"></div>
        <div class="color-dot" data-name="Pink" style="background:#ff66b2" onclick="applyTheme('#331122', '#ff66b2')"></div>
        <div class="color-dot" data-name="Green" style="background:#228b22" onclick="applyTheme('#0D2612', '#228b22')"></div>
        <div class="color-dot" data-name="Purple" style="background:#800080" onclick="applyTheme('#1E122C', '#800080')"></div>
        <div class="color-dot" data-name="Orange" style="background:#ff8c00" onclick="applyTheme('#2E1A00', '#ff8c00')"></div>
        <div class="color-dot" data-name="Teal" style="background:#008080" onclick="applyTheme('#002222', '#008080')"></div>
    </div>
</div>

<script>
const iconGallery = [
    "https://cdn-icons-png.flaticon.com/128/4354/4354959.png",
    "https://cdn-icons-png.flaticon.com/128/7321/7321058.png",
    "https://cdn-icons-png.flaticon.com/128/3004/3004949.png",
    "https://cdn-icons-png.flaticon.com/128/6152/6152858.png",
    "https://cdn-icons-png.flaticon.com/128/15428/15428976.png"
];
let currentIconIdx = 0;

function changeIcon() {
    currentIconIdx = (currentIconIdx + 1) % iconGallery.length;
    document.getElementById('cycleIcon').src = iconGallery[currentIconIdx];
}

const azkarData = [
    {
        nameEn: "Waking", nameAr: "الاستيقاظ",
        arabic: ["الْحَمْدُ لِلَّهِ الَّذِي أَحْيَانَا بَعْدَ مَا أَمَاتَنَا وَإِلَيْهِ النُّشُورُ", "لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ", "الْحَمْدُ لِلَّهِ الَّذِي عَافَانِي فِي جَسَدِي"],
        trans: ["Praise be to Allah who gave us life...", "None has the right to be worshipped but Allah...", "Praise be to Allah who gave me health..."],
        reps: [1, 1, 1]
    },
    {
        nameEn: "Morning", nameAr: "الصباح",
        arabic: ["أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ", "اللَّهُمَّ بِكَ أَصْبَحْنَا وَبِكَ أَمْسَيْنَا", "أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ"],
        trans: ["Morning has come, the kingdom belongs to Allah", "O Allah, by You we enter the morning...", "I seek refuge in the perfect words of Allah..."],
        reps: [1, 1, 3]
    },
    {
        nameEn: "Evening", nameAr: "المساء",
        arabic: ["أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ", "اللَّهُمَّ بِكَ أَمْسَيْنَا وَبِكَ أَصْبَحْنَا", "بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ"],
        trans: ["Evening has come, the kingdom belongs to Allah", "O Allah, by You we enter the evening...", "In the name of Allah, with whose name nothing is harmed..."],
        reps: [1, 1, 3]
    },
    {
        nameEn: "Sleep", nameAr: "النوم",
        arabic: ["بِاسْمِكَ رَبِّي وَضَعْتُ جَنْبِي", "اللَّهُمَّ قِنِي عَذَابَكَ يَوْمَ تَبْعَثُ عِبَادَكَ", "بِاسْمِكَ اللَّهُمَّ أَمُوتُ وَأَحْيَا"],
        trans: ["In Your name, my Lord, I lie down...", "O Allah, protect me from Your punishment...", "In Your name, O Allah, I die and live..."],
        reps: [1, 3, 1]
    }
];

let currentCat = 0, currentIndex = 0, currentCount = 0, lang = 'en';

function render() {
    const category = azkarData[currentCat];
    document.getElementById('arabicText').innerText = category.arabic[currentIndex];
    document.getElementById('translationText').innerText = category.trans[currentIndex];
    document.getElementById('progressVal').innerText = `${currentIndex + 1} / ${category.arabic.length}`;
    
    let maxReps = category.reps[currentIndex];
    document.getElementById('repeatVal').innerText = lang === 'ar' ? (maxReps === 1 ? "مرة واحدة" : maxReps + " مرات") : (maxReps === 1 ? "1 Time" : maxReps + " Times");
    
    document.getElementById('circleCount').innerText = currentCount;
    document.getElementById('lblProgress').innerText = lang === 'ar' ? "التقدم" : "PROGRESS";
    document.getElementById('lblRepeat').innerText = lang === 'ar' ? "التكرار" : "REPEAT";
    
    for(let i=0; i<4; i++) {
        document.getElementById('t'+i).innerText = (lang === 'ar') ? azkarData[i].nameAr : azkarData[i].nameEn;
    }
}

function incrementCount() {
    if (currentCount < azkarData[currentCat].reps[currentIndex]) {
        currentCount++;
        document.getElementById('circleCount').innerText = currentCount;
    }
}

function next() { currentIndex = (currentIndex + 1) % azkarData[currentCat].arabic.length; currentCount = 0; render(); }
function prev() { currentIndex = (currentIndex - 1 + azkarData[currentCat].arabic.length) % azkarData[currentCat].arabic.length; currentCount = 0; render(); }

function changeCat(index) {
    currentCat = index; currentIndex = 0; currentCount = 0;
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
    render();
}

function toggleLang() { lang = (lang === 'ar') ? 'en' : 'ar'; render(); }
function toggleColors() { document.getElementById('colorMenu').classList.toggle('show'); }

function applyTheme(bg, acc, isLight = false) {
    const root = document.documentElement;
    root.style.setProperty('--bg', bg);
    root.style.setProperty('--accent', acc);
    root.style.setProperty('--text', isLight ? '#333' : '#FFF');
    root.style.setProperty('--text-dim', isLight ? '#666' : '#B1A2C1');
    document.getElementById('colorMenu').classList.remove('show');
}

render();
</script>
</body>
</html>
