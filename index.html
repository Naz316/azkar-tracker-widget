<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azkar Tracker Notion</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #3B1414;
            --accent: #cc0000;
            --card: rgba(255, 255, 255, 0.05);
            --text: #FFFFFF;
            --text-dim: #B1A2C1;
            --font-arabic: 'Amiri', serif;
            --base-font-size: 22px; 
        }

        * { box-sizing: border-box; }
        body {
            background: transparent; font-family: 'Inter', sans-serif;
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            overflow: hidden; display: flex; justify-content: center;
        }

        .widget {
            width: 100%; height: 100vh; background-color: var(--bg);
            padding: 20px; display: flex; flex-direction: column;
            position: relative; transition: background-color 0.3s ease;
        }

        /* HEADER */
        .header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; height: 60px; margin-bottom: 10px; z-index: 100; }
        .header-left, .header-right { display: flex; align-items: center; }
        .header-right { justify-content: flex-end; }
        
        .icon-btn {
            background: none; border: none; cursor: pointer;
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            color: white; 
        }
        .icon-btn img { width: 38px; height: 38px; object-fit: contain; }
        
        /* Menu bar icon made big like language icon */
        .menu-trigger { font-size: 42px; line-height: 1; }

        .floating-icon { width: 65px; height: 65px; cursor: pointer; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        /* TABS - 5 columns for Favs after Sleep */
        .tabs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 15px; }
        .tab {
            background: transparent; border: none; color: var(--text-dim);
            padding: 10px 2px; border-radius: 14px; cursor: pointer;
            font-size: 11px; font-weight: 700; text-align: center;
            transition: 0.15s; display: flex; flex-direction: column; align-items: center;
        }
        .tab.active { background: var(--accent); color: white; }
        .tab span { font-size: 22px; margin-bottom: 4px; }

        /* MAIN CONTENT */
        .main-display {
            flex-grow: 1; overflow-y: auto; padding: 20px; text-align: center;
            display: flex; flex-direction: column; background: rgba(0,0,0,0.15);
            border-radius: 20px; margin-bottom: 15px; justify-content: flex-start;
            position: relative;
        }
        .arabic { font-family: var(--font-arabic); direction: rtl; line-height: 1.7; margin-bottom: 15px; white-space: pre-wrap; transition: 0.3s; }
        .translation { line-height: 1.5; transition: 0.3s; }

        /* Typography logic based on language */
        .lang-ar .arabic { font-size: var(--base-font-size); color: var(--text); font-weight: 700; }
        .lang-ar .translation { font-size: calc(var(--base-font-size) * 0.65); color: var(--text-dim); font-weight: 400; }
        .lang-en .arabic { font-size: calc(var(--base-font-size) * 0.8); color: var(--text-dim); font-weight: 400; }
        .lang-en .translation { font-size: calc(var(--base-font-size) * 0.85); color: var(--text); font-weight: 700; }

        /* FOOTER */
        .footer-controls { display: flex; justify-content: space-between; align-items: center; height: 90px; flex-shrink: 0; }
        .side-info { flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 80px; }
        .info-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 4px;}
        .info-value { font-size: 14px; color: var(--text); font-weight: 700; }

        .counter-container {
            position: relative; width: 80px; height: 80px; display: flex; align-items: center;
            justify-content: center; cursor: pointer; margin: 0 5px; border-radius: 50%; transition: 0.3s;
        }
        .counter-container.completed { box-shadow: 0 0 15px var(--accent); }
        .counter-container svg { position: absolute; transform: rotate(-90deg); width: 100%; height: 100%; }
        .circle-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 6; }
        .circle-progress { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.15s ease; }
        #circleCount { font-size: 28px; font-weight: 700; color: var(--text); z-index: 2; }
        .nav-btn { background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; padding: 10px; }

        /* MENU */
        .menu-popover {
            position: absolute; top: 75px; right: 20px; background: #1A1A1A;
            padding: 18px; border-radius: 16px; visibility: hidden; opacity: 0;
            transition: 0.1s; z-index: 1000; width: 260px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
        }
        .menu-popover.show { visibility: visible; opacity: 1; }
        .menu-section-title { color: white; font-size: 14px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .menu-divider { height: 1px; background: rgba(255,255,255,0.15); margin: 0 0 15px 0; border: none; }
        
        .color-menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .color-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); transition: 0.15s; display: flex; align-items: center; justify-content: center; }
        .color-dot.active { border-color: white; }
        .color-dot.active::after { content: '✓'; color: white; font-size: 12px; }

        .settings-rows { display: flex; flex-direction: column; gap: 12px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; color: white; font-size: 13px; font-weight: 600; }
        .font-slider { width: 85px; accent-color: var(--accent); cursor: pointer; }

        /* ACTION BUTTONS */
        .action-btns { display: flex; gap: 8px; margin-top: 10px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
        .action-btn {
            flex: 1; height: 42px; border-radius: 10px; border: none; cursor: pointer;
            background: var(--accent); display: flex; align-items: center; justify-content: center;
            position: relative; transition: 0.2s;
        }
        .action-btn svg { width: 22px; height: 22px; fill: white; transition: 0.2s; }
        .action-btn:hover { filter: brightness(1.2); }
        .action-btn.active-fav svg { fill: #ff4757; }

        .action-btn::after {
            content: attr(data-tooltip); position: absolute; bottom: 50px; background: #333;
            color: white; font-size: 11px; padding: 4px 10px; border-radius: 6px;
            visibility: hidden; opacity: 0; transition: 0.15s; white-space: nowrap; pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .action-btn:hover::after { visibility: visible; opacity: 1; }

        .share-submenu { 
            position: absolute; bottom: 140px; right: 20px; background: #1A1A1A; 
            border-radius: 12px; padding: 8px; width: 170px; display: none;
            border: 1px solid rgba(255,255,255,0.1); z-index: 1100;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
        .share-item {
            display: flex; align-items: center; gap: 12px; padding: 10px;
            color: white; text-decoration: none; font-size: 13px; border-radius: 8px; transition: 0.2s;
        }
        .share-item:hover { background: rgba(255,255,255,0.1); }
        .share-item svg { width: 18px; height: 18px; fill: white; }

        .switch { position: relative; display: inline-block; width: 42px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .2s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: #888; transition: .2s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); background-color: white; }

        .main-display::-webkit-scrollbar { width: 4px; }
        .main-display::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>

<script>
// --- DATA (Restored Full) ---
const azkarData = [
    {
        nameEn: "Waking Up", nameAr: "الاستيقاظ",
        arabic: [
            "لَا إِلٰهَ إِلاَّ اللّٰهُ الْوَاحِدُ الْقَهَّارُ ، رَبُّ السَّمٰـوٰتِ وَالْأَرْضِ وَمَا بَيْنَهُمَا الْعَزِيْزُ الْغَفَّارُ",

let cat = 0, idx = 0, count = 0, lang = 'ar';
let favs = JSON.parse(localStorage.getItem('azkarFavs')) || [];
const circleCircum = 2 * Math.PI * 38;

window.onload = () => { autoTime(); render(); };

function autoTime() {
    const h = new Date().getHours();
    if(h >= 5 && h < 12) cat = 1;
    else if(h >= 16 && h < 20) cat = 2;
    else if(h >= 20 || h < 5) cat = 3;
    else cat = 0;
}

function render() {
    const isFav = cat === 4;
    const list = isFav ? favs : azkarData[cat].arabic;
    const scroll = document.getElementById('scrollArea');

    if(isFav && list.length === 0) {
        document.getElementById('arabicText').innerText = lang === 'ar' ? "المفضلة فارغة" : "Favorites is empty";
        document.getElementById('translationText').innerText = "";
        document.getElementById('progressVal').innerText = "0 / 0";
        document.getElementById('repeatVal').innerText = "";
        document.getElementById('circleCount').innerText = "0";
    } else {
        const item = isFav ? list[idx] : {
            arabic: azkarData[cat].arabic[idx],
            trans: azkarData[cat].trans[idx],
            reps: azkarData[cat].reps[idx]
        };
        document.getElementById('arabicText').innerText = item.arabic;
        document.getElementById('translationText').innerText = item.trans;
        document.getElementById('progressVal').innerText = `${idx + 1} / ${list.length}`;
        document.getElementById('repeatVal').innerText = getRepText(item.reps);
        document.getElementById('circleCount').innerText = count;
        
        const inFavs = favs.some(f => f.arabic === item.arabic);
        document.getElementById('btnFav').classList.toggle('active-fav', inFavs);
        
        updateProgress(count, item.reps);
    }

    const labels = {
        ar: { p: "التقدم", r: "التكرار", c: "الألوان", s: "الإعدادات", s1: "صوت النقرة", s2: "اهتزاز", s3: "حجم الخط", s4: "تحويل تلقائي", t0: "الاستيقاظ", t1: "الصباح", t2: "المساء", t3: "النوم", t4: "المفضلة", cp: "نسخ النص", sh: "مشاركة", fv: "المفضلة", rf: "تحديث" },

function updateProgress(c, m) {
    const ring = document.getElementById('progressRing');
    const offset = circleCircum - ((c / m) * circleCircum);
    ring.style.strokeDasharray = `${circleCircum} ${circleCircum}`;
    ring.style.strokeDashoffset = offset;
    document.getElementById('counterCont').classList.toggle('completed', c === m);
}

function getRepText(r) {
    if(lang === 'en') return r === 1 ? "1 Time" : r + " Times";
    const m = {1:"مرة واحدة", 2:"مرتان", 3:"٣ مرات", 33:"٣٣ مرة", 100:"١٠٠ مرة"};
    return m[r] || r + " مرات";
}

function increment() {
    const list = cat === 4 ? favs : azkarData[cat].arabic;
    if(!list.length) return;
    const max = cat === 4 ? favs[idx].reps : azkarData[cat].reps[idx];
    if(count < max) {
        count++; playTap(); render();
        if(count === max) {
            playVib();
            if(document.getElementById('chkAuto').checked) setTimeout(next, 800);
        }
    }
}

function next() { 
    const l = cat === 4 ? favs : azkarData[cat].arabic;
    if(!l.length) return;
    idx = (idx + 1) % l.length; count = 0; render(); 
}
function prev() { 
    const l = cat === 4 ? favs : azkarData[cat].arabic;
    if(!l.length) return;
    idx = (idx - 1 + l.length) % l.length; count = 0; render(); 
}
function changeCat(i) { cat = i; idx = 0; count = 0; render(); }
function toggleLang() { lang = (lang === 'ar' ? 'en' : 'ar'); document.getElementById('bodyNode').className = 'lang-' + lang; render(); }
function setFs(v) { document.documentElement.style.setProperty('--base-font-size', v + 'px'); }

    };
    const fIdx = favs.findIndex(f => f.arabic === current.arabic);
    if(fIdx > -1) favs.splice(fIdx, 1); else favs.push(current);
    localStorage.setItem('azkarFavs', JSON.stringify(favs));
    render();
}

function doSmartCopy() {
    const t = (lang === 'ar') ? document.getElementById('arabicText').innerText : document.getElementById('translationText').innerText;
    navigator.clipboard.writeText(t);
    const b = document.getElementById('btnCopy');
    const old = b.innerHTML; b.innerHTML = '<span style="color:#00ff00; font-size:16px">✓</span>';
    setTimeout(() => b.innerHTML = old, 1000);
}

function toggleMenu() { document.getElementById('menu').classList.toggle('show'); }
function toggleShare() { const s = document.getElementById('shareSub'); s.style.display = s.style.display === 'block' ? 'none' : 'block'; }
function shareTo(p) {
    const t = encodeURIComponent(document.getElementById('arabicText').innerText);
    const u = { tw: `https://twitter.com/intent/tweet?text=${t}`, fb: `https://facebook.com/sharer/sharer.php?u=${location.href}`, wa: `https://wa.me/?text=${t}`, tg: `https://t.me/share/url?url=${location.href}&text=${t}` };
    window.open(u[p], '_blank');
}

function applyTheme(bg, acc, el) {
    document.documentElement.style.setProperty('--bg', bg);
    document.documentElement.style.setProperty('--accent', acc);
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
    el.classList.add('active');
}

const ctx = new (window.AudioContext || window.webkitAudioContext)();
function playTap() {
    if(!document.getElementById('chkClick').checked) return;
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.frequency.setValueAtTime(600, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
    o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 0.1);
}
function playVib() {
    if(!document.getElementById('chkVibrate').checked) return;
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type = 'square'; o.frequency.setValueAtTime(150, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 0.3);
}

function changeIcon() {
    const g = ["https://cdn-icons-png.flaticon.com/128/4354/4354959.png","https://cdn-icons-png.flaticon.com/128/13773/13773984.png"];
    const img = document.getElementById('cycleIcon');
    img.src = img.src.includes('13773') ? g[0] : g[1];
}
</script>
