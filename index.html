<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azkar Tracker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #3B1414; /* Red Theme Default */
            --accent: #CC0000; 
            --card: rgba(255, 255, 255, 0.05);
            --text: #FFFFFF;
            --text-dim: rgba(255, 255, 255, 0.5);
            --font-arabic: 'Amiri', serif;
            --base-font-size: 22px; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: transparent;
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden; display: flex; justify-content: center;
        }

        .widget {
            width: 100%; height: 100vh;
            background-color: var(--bg);
            padding: 15px; display: flex; flex-direction: column;
            position: relative; transition: background-color 0.4s ease;
        }

        /* HEADER */
        .header {
            display: grid; grid-template-columns: 1fr auto 1fr;
            align-items: center; height: 50px; margin-bottom: 10px; z-index: 100;
        }
        
        .icon-btn {
            background: none; border: none; cursor: pointer;
            width: 40px; height: 40px; padding: 0;
            display: flex; align-items: center; justify-content: center;
            color: white;
        }
        .icon-btn img { width: 30px; height: 30px; object-fit: contain; }

        .floating-icon {
            width: 55px; height: 55px; cursor: pointer;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

        /* TABS */
        .tabs {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 4px; margin-bottom: 10px;
        }
        .tab {
            background: rgba(255,255,255,0.05); border: none; color: var(--text-dim);
            padding: 8px 2px; border-radius: 12px; cursor: pointer;
            font-size: 10px; font-weight: 700; text-align: center;
            transition: 0.3s; display: flex; flex-direction: column; align-items: center;
        }
        .tab.active { background: var(--accent); color: white; transform: scale(1.05); }
        .tab span { font-size: 18px; margin-bottom: 2px; }

        /* MAIN CONTENT - Full Text Integrity */
        .main-display {
            flex-grow: 1; overflow-y: auto; padding: 20px;
            text-align: center; display: flex; flex-direction: column;
            background: rgba(0,0,0,0.2); border-radius: 20px;
            margin-bottom: 10px; justify-content: flex-start;
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent;
        }
        .main-display::-webkit-scrollbar { width: 4px; }
        .main-display::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .arabic { 
            font-family: var(--font-arabic); direction: rtl; 
            line-height: 1.6; margin-bottom: 20px; 
            white-space: pre-wrap; word-wrap: break-word;
            transition: all 0.3s ease;
        }
        .translation { 
            line-height: 1.5; 
            white-space: pre-wrap; word-wrap: break-word;
            transition: all 0.3s ease; 
        }

        /* Typography Swap Logic */
        .lang-ar .arabic { font-size: var(--base-font-size); color: var(--text); font-weight: 700; opacity: 1; }
        .lang-ar .translation { font-size: calc(var(--base-font-size) * 0.7); color: var(--text-dim); opacity: 0.8; }
        
        .lang-en .arabic { font-size: calc(var(--base-font-size) * 0.85); color: var(--text-dim); opacity: 0.8; }
        .lang-en .translation { font-size: calc(var(--base-font-size) * 0.85); color: var(--text); font-weight: 700; opacity: 1; }

        /* FOOTER */
        .footer-controls { display: flex; justify-content: space-between; align-items: center; height: 80px; flex-shrink: 0; }
        .side-info { flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 70px; }
        .info-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; }
        .info-value { font-size: 13px; color: var(--text); font-weight: 700; margin-top: 2px; }

        .counter-container {
            position: relative; width: 75px; height: 75px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; margin: 0 10px; border-radius: 50%; 
        }
        .counter-container.completed { animation: pulseGlow 1s infinite alternate; }
        @keyframes pulseGlow { from { box-shadow: 0 0 5px var(--accent); } to { box-shadow: 0 0 20px var(--accent); } }

        .counter-container svg { position: absolute; transform: rotate(-90deg); width: 100%; height: 100%; }
        .circle-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 5; }
        .circle-progress { fill: none; stroke: var(--accent); stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.3s ease; }
        #circleCount { font-size: 24px; font-weight: 800; color: var(--text); z-index: 2; }
        .nav-btn { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; padding: 10px; opacity: 0.7; transition: 0.2s; }
        .nav-btn:hover { opacity: 1; transform: scale(1.2); }

        /* SETTINGS MENU */
        .menu-popover {
            position: absolute; top: 65px; right: 15px;
            background: #181818; padding: 20px; border-radius: 18px;
            visibility: hidden; opacity: 0; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1000; width: 280px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
        }
        .menu-popover.show { visibility: visible; opacity: 1; transform: translateY(5px); }
        .menu-section-title { color: white; font-size: 12px; font-weight: 800; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; opacity: 0.9; }

        /* COLORS */
        .color-menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .color-dot { width: 34px; height: 34px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; display: flex; align-items: center; justify-content: center; position: relative; }
        .color-dot.active { border-color: white; transform: scale(1.1); }
        .color-dot.active::after { content: '✓'; color: white; font-size: 12px; font-weight: bold; }

        /* ACTIONS */
        .action-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .action-btn {
            height: 45px; border-radius: 12px; border: none; cursor: pointer;
            background: rgba(255,255,255,0.08); color: white; display: flex; align-items: center; justify-content: center;
            transition: 0.2s; position: relative;
        }
        .action-btn svg { width: 22px; height: 22px; fill: currentColor; }
        .action-btn:hover { background: var(--accent); }

        /* Tooltip */
        .action-btn::after {
            content: attr(data-tooltip); position: absolute; bottom: 55px; background: #333; color: white;
            font-size: 10px; padding: 5px 10px; border-radius: 6px; visibility: hidden; opacity: 0; transition: 0.2s; white-space: nowrap;
        }
        .action-btn:hover::after { visibility: visible; opacity: 1; }

        /* TOGGLES & SLIDER */
        .settings-rows { display: flex; flex-direction: column; gap: 12px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; color: white; font-size: 13px; font-weight: 600; }
        .font-slider { width: 100px; accent-color: var(--accent); cursor: pointer; }

        .switch { position: relative; display: inline-block; width: 38px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: #888; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(18px); background-color: white; }

        /* SHARE SUBMENU */
        .share-popup {
            position: absolute; bottom: 65px; right: 0; background: #222; border-radius: 14px; 
            padding: 8px; display: none; flex-direction: column; gap: 5px; z-index: 2000; border: 1px solid #444; width: 140px;
        }
        .share-option {
            display: flex; align-items: center; gap: 10px; padding: 10px; color: white;
            font-size: 12px; text-decoration: none; border-radius: 8px; transition: 0.2s;
        }
        .share-option:hover { background: var(--accent); }
        .share-option svg { width: 18px; height: 18px; fill: white; }
    </style>
</head>
<body class="lang-ar" id="bodyNode">

<div class="widget">
    <div class="header">
        <div class="header-left">
            <button class="icon-btn" onclick="toggleLang()">
                <img src="https://cdn-icons-png.flaticon.com/128/6212/6212766.png" alt="Language">
            </button>
        </div>
        <div class="header-center">
            <img id="cycleIcon" class="floating-icon" src="https://cdn-icons-png.flaticon.com/128/13773/13773984.png" onclick="changeIcon()" alt="Azkar Icon">
        </div>
        <div class="header-right">
            <button class="icon-btn" onclick="toggleUnifiedMenu()">☰</button>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab" id="tab0" onclick="changeCat(0)"><span>🌅</span><label id="t0">Waking</label></button>
        <button class="tab" id="tab1" onclick="changeCat(1)"><span>☀️</span><label id="t1">Morning</label></button>
        <button class="tab" id="tab2" onclick="changeCat(2)"><span>🌇</span><label id="t2">Evening</label></button>
        <button class="tab" id="tab3" onclick="changeCat(3)"><span>🛌</span><label id="t3">Sleep</label></button>
        <button class="tab" id="tab4" onclick="changeCat(4)"><span>❤️</span><label id="t4">Favs</label></button>
    </div>

    <div class="main-display" id="scrollArea">
        <div class="arabic" id="arabicText"></div>
        <div class="translation" id="translationText"></div>
    </div>

    <div class="footer-controls">
        <button class="nav-btn" onclick="prev()">❮</button>
        <div class="side-info">
            <span class="info-label" id="lblProgress">PROGRESS</span>
            <span class="info-value" id="progressVal">0 / 0</span>
        </div>
        <div id="counterRingCont" class="counter-container" onclick="incrementCount()">
            <svg viewBox="0 0 85 85">
                <circle class="circle-bg" cx="42.5" cy="42.5" r="38"></circle>
                <circle id="progressRing" class="circle-progress" cx="42.5" cy="42.5" r="38"></circle>
            </svg>
            <div id="circleCount">0</div>
        </div>
        <div class="side-info">
            <span class="info-label" id="lblRepeat">REPEAT</span>
            <span class="info-value" id="repeatVal">-</span>
        </div>
        <button class="nav-btn" onclick="next()">❯</button>
    </div>

    <div class="menu-popover" id="unifiedMenu">
        <div class="menu-section-title"><span>🎨</span><span id="menuTitleColors">Themes</span></div>
        <div class="color-menu">
            <div class="color-dot active" data-en="Red" data-ar="أحمر" style="background:#cc0000" onclick="applyTheme('#3B1414', '#cc0000', this)"></div>
            <div class="color-dot" data-en="Purple" data-ar="بنفسجي" style="background:#800080" onclick="applyTheme('#1E122C', '#800080', this)"></div>
            <div class="color-dot" data-en="Blue" data-ar="أزرق" style="background:#0066cc" onclick="applyTheme('#0A192F', '#0066cc', this)"></div>
            <div class="color-dot" data-en="Green" data-ar="أخضر" style="background:#228b22" onclick="applyTheme('#0D2612', '#228b22', this)"></div>
            <div class="color-dot" data-en="Teal" data-ar="تركوازي" style="background:#008080" onclick="applyTheme('#002222', '#008080', this)"></div>
            <div class="color-dot" data-en="Orange" data-ar="برتقالي" style="background:#ff8c00" onclick="applyTheme('#2E1A00', '#ff8c00', this)"></div>
            <div class="color-dot" data-en="Pink" data-ar="وردي" style="background:#ff66b2" onclick="applyTheme('#331122', '#ff66b2', this)"></div>
            <div class="color-dot" data-en="Black" data-ar="أسود" style="background:#000000" onclick="applyTheme('#000000', '#444444', this)"></div>
        </div>
        
        <div class="menu-section-title"><span>⚙️</span><span id="menuTitleSettings">Preferences</span></div>
        <div class="settings-rows">
            <div class="setting-row"><div class="setting-label"><span>🔊</span><span id="set1">Click Sound</span></div><label class="switch"><input type="checkbox" id="chkClick" checked><span class="slider"></span></label></div>
            <div class="setting-row"><div class="setting-label"><span>🔄</span><span id="set3">Auto-Next</span></div><label class="switch"><input type="checkbox" id="chkAuto" checked><span class="slider"></span></label></div>
            <div class="setting-row"><div class="setting-label"><span>📏</span><span id="set4">Text Size</span></div><input type="range" min="16" max="32" value="22" class="font-slider" oninput="changeFontSize(this.value)"></div>
        </div>

        <div class="action-btns">
            <button class="action-btn" id="btnFav" onclick="toggleFav()" data-tooltip="Favorite">
                <svg id="heartIcon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </button>
            <button class="action-btn" id="btnCopy" onclick="copyDynamicText()" data-tooltip="Copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            </button>
            <button class="action-btn" id="btnShare" onclick="toggleShare()" data-tooltip="Share">
                <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
                <div id="sharePopup" class="share-popup">
                    <a href="#" class="share-option" onclick="doShare('wa')"><span>WhatsApp</span></a>
                    <a href="#" class="share-option" onclick="doShare('x')"><span>X (Twitter)</span></a>
                    <a href="#" class="share-option" onclick="doShare('tg')"><span>Telegram</span></a>
                </div>
            </button>
            <button class="action-btn" id="btnRefresh" onclick="location.reload()" data-tooltip="Reset All">
                <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            </button>
        </div>
    </div>
</div>

<script>
/* --- FULL DATA ARRAY --- */
const azkarData = [
    {
        nameEn: "Waking Up", nameAr: "الاستيقاظ",
        arabic: [
            "لَا إِلٰهَ إِلاَّ اللّٰهُ الْوَاحِدُ الْقَهَّارُ ، رَبُّ السَّمٰـوٰتِ وَالْأَرْضِ وَمَا بَيْنَهُمَا الْعَزِيْزُ الْغَفَّارُ",
            "لَا إِلَهَ إِلَّا اللّٰهُ وَحْدَهُ لَا شَرِيْكَ لَهُ ، لَهُ الْمُلْكُ ، وَلَهُ الْحَمْدُ ، وَهُوَ عَلَىٰ كُلِّ شَيْءٍ قَدِيْرٌ‏ ، اَلْحَمْدُ لِلّٰهِ‏ ، وَسُبْحَانَ اللّٰهِ ، وَلَا إِلٰهَ إِلَّا اللّٰهُ ، وَاللّٰهُ أَكْبَرُ ، وَلَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللّٰهِ ، اَللّٰهُمَّ اغْفِرْ لِيْ.",

/* --- LOGIC STATE --- */
let currentCat = 0, currentIndex = 0, currentCount = 0, lang = 'ar';
let favorites = JSON.parse(localStorage.getItem('azkar_favs_v2') || "[]");
const circleRadius = 38;
const circleCircumference = 2 * Math.PI * circleRadius;

window.onload = function() {
    autoSelectByTime();
    render();
    // Default Red Theme activation
    document.querySelector('.color-dot').click();
};

function autoSelectByTime() {
    const hr = new Date().getHours();
    if (hr >= 5 && hr < 12) currentCat = 1; // Morning
    else if (hr >= 16 && hr < 20) currentCat = 2; // Evening
    else if (hr >= 20 || hr < 5) currentCat = 3; // Sleep
    else currentCat = 0; // Waking
}

function render() {
    let category, realIdx = currentIndex;
    
    if (currentCat === 4) { // Favorites logic
        if (favorites.length === 0) {
            document.getElementById('arabicText').innerText = lang === 'ar' ? "قائمة المفضلة فارغة" : "Favorites list is empty";
            document.getElementById('translationText').innerText = "0/0";
            updateUIEmpty();
            return;
        }
        const fav = favorites[currentIndex];
        category = azkarData[fav.cat];
        realIdx = fav.idx;
    } else {
        category = azkarData[currentCat];
    }

    document.getElementById('arabicText').innerText = category.arabic[realIdx];
    document.getElementById('translationText').innerText = category.trans[realIdx];
    
    const totalItems = (currentCat === 4) ? favorites.length : category.arabic.length;
    document.getElementById('progressVal').innerText = `${currentIndex + 1} / ${totalItems}`;
    document.getElementById('repeatVal').innerText = getRepetitionText(category.reps[realIdx]);
    document.getElementById('circleCount').innerText = currentCount;
    updateCircleProgress(currentCount, category.reps[realIdx]);

    updateLocalizedUI();
    updateMenuState();
}

function updateUIEmpty() {
    document.getElementById('progressVal').innerText = "0 / 0";
    document.getElementById('repeatVal').innerText = "-";
    document.getElementById('circleCount').innerText = "0";
    updateCircleProgress(0, 1);
}

function updateLocalizedUI() {
    const ui = {
        ar: { prog: "التقدم", rep: "التكرار", favA: "إضافة للمفضلة", favR: "إزالة من المفضلة", copy: "نسخ النص" },
        en: { prog: "PROGRESS", rep: "REPEAT", favA: "Add to Favorites", favR: "Remove from Favorites", copy: "Copy Text" }
    }[lang];

    document.getElementById('lblProgress').innerText = ui.prog;
    document.getElementById('lblRepeat').innerText = ui.rep;

    // Tabs
    for(let i=0; i<4; i++) {
        document.getElementById('t'+i).innerText = (lang === 'ar') ? azkarData[i].nameAr : azkarData[i].nameEn;
    }
    document.getElementById('t4').innerText = (lang === 'ar') ? "المفضلة" : "Favs";
    
    // Active Tab Style
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === currentCat));
}

function updateMenuState() {
    const isFav = isCurrentFavorite();
    const heart = document.getElementById('heartIcon');
    heart.style.fill = isFav ? "#cc0000" : "transparent";
    heart.style.stroke = isFav ? "#cc0000" : "white";
    
    const ui = (lang === 'ar') ? { add: "إضافة للمفضلة", rem: "إزالة من المفضلة" } : { add: "Add to Favorites", rem: "Remove from Favorites" };
    document.getElementById('btnFav').setAttribute('data-tooltip', isFav ? ui.rem : ui.add);
}

function incrementCount() {
    let max;
    if (currentCat === 4) {
        if (favorites.length === 0) return;
        max = azkarData[favorites[currentIndex].cat].reps[favorites[currentIndex].idx];
    } else {
        max = azkarData[currentCat].reps[currentIndex];
    }

    if (currentCount < max) {
        currentCount++;
        if(document.getElementById('chkClick').checked) playSound(600, 0.1);
        render();
        if (currentCount === max) {
            playSound(120, 0.4); // Completion sound
            if(document.getElementById('chkAuto').checked) setTimeout(next, 800);
        }
    }
}

function next() {
    const len = (currentCat === 4) ? favorites.length : azkarData[currentCat].arabic.length;
    if (len === 0) return;
    currentIndex = (currentIndex + 1) % len;
    currentCount = 0;
    render();
}

function prev() {
    const len = (currentCat === 4) ? favorites.length : azkarData[currentCat].arabic.length;
    if (len === 0) return;
    currentIndex = (currentIndex - 1 + len) % len;
    currentCount = 0;
    render();
}

function toggleFav() {
    let cat, idx;
    if (currentCat === 4) {
        if (favorites.length === 0) return;
        favorites.splice(currentIndex, 1);
        if (currentIndex >= favorites.length && currentIndex > 0) currentIndex--;
    } else {
        const existing = favorites.findIndex(f => f.cat === currentCat && f.idx === currentIndex);
        if (existing > -1) favorites.splice(existing, 1);
        else favorites.push({ cat: currentCat, idx: currentIndex });
    }
    localStorage.setItem('azkar_favs_v2', JSON.stringify(favorites));
    render();
}

function isCurrentFavorite() {
    if (currentCat === 4) return favorites.length > 0;
    return favorites.some(f => f.cat === currentCat && f.idx === currentIndex);
}

function copyDynamicText() {
    let text;
    if (currentCat === 4) {
        const fav = favorites[currentIndex];
        text = (lang === 'ar') ? azkarData[fav.cat].arabic[fav.idx] : azkarData[fav.cat].trans[fav.idx];
    } else {
        text = (lang === 'ar') ? azkarData[currentCat].arabic[currentIndex] : azkarData[currentCat].trans[currentIndex];
    }
    navigator.clipboard.writeText(text);
    const btn = document.getElementById('btnCopy');
    const old = btn.innerHTML;
    btn.innerHTML = '✅';
    setTimeout(() => btn.innerHTML = old, 1000);
}

function getRepetitionText(count) {
    if (lang === 'en') return count === 1 ? "Once" : count + " Times";
    const map = {1:"مرة واحدة", 2:"مرتان", 3:"٣ مرات", 33:"٣٣ مرة", 34:"٣٤ مرة", 100:"١٠٠ مرة"};
    return map[count] || count + " مرات";
}

function updateCircleProgress(count, max) {
    const ring = document.getElementById('progressRing');
    const cont = document.getElementById('counterRingCont');
    const offset = circleCircumference - ((count / max) * circleCircumference);
    ring.style.strokeDasharray = `${circleCircumference} ${circleCircumference}`;
    ring.style.strokeDashoffset = offset;
    cont.classList.toggle('completed', count === max);
}

function toggleLang() {
    lang = (lang === 'ar') ? 'en' : 'ar';
    document.getElementById('bodyNode').className = 'lang-' + lang;
    render();
}

function changeCat(id) { currentCat = id; currentIndex = 0; currentCount = 0; render(); }
function toggleUnifiedMenu() { document.getElementById('unifiedMenu').classList.toggle('show'); }
function changeFontSize(v) { document.documentElement.style.setProperty('--base-font-size', v + 'px'); }

function applyTheme(bg, acc, el) {
    document.documentElement.style.setProperty('--bg', bg);
    document.documentElement.style.setProperty('--accent', acc);
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
    el.classList.add('active');
}

function toggleShare() {
    const p = document.getElementById('sharePopup');
    p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
}

function doShare(plat) {
    let txt = (lang === 'ar') ? document.getElementById('arabicText').innerText : document.getElementById('translationText').innerText;
    const url = encodeURIComponent(txt);
    const links = {
        wa: `https://api.whatsapp.com/send?text=${url}`,
        x: `https://twitter.com/intent/tweet?text=${url}`,
        tg: `https://t.me/share/url?url=${url}`
    };
    window.open(links[plat], '_blank');
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, dur) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}

function changeIcon() {
    const gallery = ["13773984.png", "4354959.png", "7321058.png", "3004949.png"];
    const icon = document.getElementById('cycleIcon');
    let cur = icon.src.split('/').pop();
    let nextIdx = (gallery.indexOf(cur) + 1) % gallery.length;
    icon.src = "https://cdn-icons-png.flaticon.com/128/13773/" + gallery[nextIdx];
}
