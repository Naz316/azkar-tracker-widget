<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azkar Tracker Notion</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #3B1414;
            --accent: #cc0000;
            --card: rgba(255, 255, 255, 0.05);
            --text: #FFFFFF;
            --text-dim: #B1A2C1;
            --font-arabic: 'Amiri', serif;
            --base-font-size: 22px; 
        }

        * { box-sizing: border-box; }

        body {
            background: transparent;
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden; display: flex; justify-content: center;
        }

        .widget {
            width: 100%; height: 100vh;
            background-color: var(--bg);
            padding: 20px; display: flex; flex-direction: column;
            position: relative; transition: background-color 0.3s ease;
        }

        /* HEADER */
        .header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; height: 60px; margin-bottom: 10px; z-index: 100; }
        .header-left { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
        .header-right { display: flex; justify-content: flex-end; }
        
        .icon-btn {
            background: none; border: none; cursor: pointer;
            width: 38px; height: 38px; padding: 0;
            display: flex; align-items: center; justify-content: center;
            color: white; transition: 0.2s;
        }
        .icon-btn img { width: 32px; height: 32px; object-fit: contain; }
        .header-heart { fill: rgba(255,255,255,0.3); width: 28px; height: 28px; cursor: pointer; transition: 0.3s; }
        .header-heart.active { fill: #ff4d4d; filter: drop-shadow(0 0 5px #ff4d4d); }

        .floating-icon { width: 65px; height: 65px; cursor: pointer; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        /* TABS */
        .tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .tab {
            background: transparent; border: none; color: var(--text-dim);
            padding: 12px 2px; border-radius: 14px; cursor: pointer;
            font-size: 13px; font-weight: 700; text-align: center;
            transition: 0.15s; display: flex; flex-direction: column; align-items: center;
        }
        .tab.active { background: var(--accent); color: white; }
        .tab span { font-size: 26px; margin-bottom: 4px; }

        /* MAIN CONTENT */
        .main-display {
            flex-grow: 1; overflow-y: auto; padding: 20px;
            text-align: center; display: flex; flex-direction: column;
            background: rgba(0,0,0,0.15); border-radius: 20px;
            margin-bottom: 15px; justify-content: flex-start;
            position: relative; cursor: help;
        }
        
        /* Favorite Tooltip on Zikr Hover */
        .main-display::after {
            content: attr(data-fav-hint); position: absolute; top: 10px; left: 50%;
            transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white;
            padding: 4px 10px; border-radius: 6px; font-size: 10px; visibility: hidden; opacity: 0; transition: 0.2s;
        }
        .main-display:hover::after { visibility: visible; opacity: 1; }

        .arabic { font-family: var(--font-arabic); direction: rtl; line-height: 1.7; margin-bottom: 15px; white-space: pre-wrap; transition: all 0.3s; }
        .translation { line-height: 1.5; transition: all 0.3s; }

        .lang-ar .arabic { font-size: var(--base-font-size); color: var(--text); font-weight: 700; }
        .lang-ar .translation { font-size: calc(var(--base-font-size) * 0.65); color: var(--text-dim); }
        .lang-en .arabic { font-size: calc(var(--base-font-size) * 0.8); color: var(--text-dim); }
        .lang-en .translation { font-size: calc(var(--base-font-size) * 0.85); color: var(--text); font-weight: 700; }

        /* FOOTER */
        .footer-controls { display: flex; justify-content: space-between; align-items: center; height: 90px; flex-shrink: 0; }
        .side-info { flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 90px; }
        .info-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 4px; }
        .info-value { font-size: 16px; color: var(--text); font-weight: 700; }

        .counter-container { position: relative; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin: 0 10px; border-radius: 50%; transition: 0.3s; }
        .counter-container.completed { box-shadow: 0 0 15px var(--accent); }
        .counter-container svg { position: absolute; transform: rotate(-90deg); width: 100%; height: 100%; }
        .circle-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 6; }
        .circle-progress { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.15s ease; }
        #circleCount { font-size: 28px; font-weight: 700; color: var(--text); z-index: 2; }
        .nav-btn { background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; padding: 10px; }

        /* MENU POPOVER */
        .menu-popover {
            position: absolute; top: 75px; right: 20px;
            background: #1A1A1A; padding: 18px; border-radius: 16px;
            visibility: hidden; opacity: 0; transition: 0.1s; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); width: 260px;
        }
        .menu-popover.show { visibility: visible; opacity: 1; }
        .menu-divider { height: 2px; background: rgba(255,255,255,0.2); margin: 12px 0; border: none; }
        
        .color-menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .color-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.15s; display: flex; align-items: center; justify-content: center; }
        .color-dot.active { border-color: white; }
        .color-dot.active::after { content: '✓'; color: white; font-size: 12px; }

        /* SETTINGS ROWS */
        .setting-row { display: flex; justify-content: space-between; align-items: center; color: white; font-size: 13px; font-weight: 600; margin-bottom: 10px; }
        .font-slider { width: 80px; accent-color: var(--accent); }

        /* ACTION ROW & ICONS */
        .action-row { display: flex; justify-content: space-between; gap: 8px; margin-top: 10px; }
        .action-btn {
            flex: 1; height: 42px; border-radius: 10px; border: none; cursor: pointer;
            background: var(--accent); display: flex; align-items: center; justify-content: center;
            position: relative; transition: 0.2s;
        }
        .action-btn svg { width: 20px; height: 20px; fill: white; }
        .action-btn.fav-active svg { fill: #ff4d4d; }
        
        /* Uniform Tooltips */
        .action-btn::before {
            content: attr(data-tooltip); position: absolute; bottom: 48px; background: #333;
            color: white; font-size: 10px; padding: 5px 8px; border-radius: 5px;
            visibility: hidden; opacity: 0; transition: 0.15s; white-space: nowrap;
        }
        .action-btn:hover::before { visibility: visible; opacity: 1; }

        /* SHARE SUBMENU */
        .share-menu {
            display: none; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px;
            padding: 8px; background: rgba(255,255,255,0.05); border-radius: 8px;
        }
        .share-menu.show { display: grid; }
        .share-item { background: none; border: none; cursor: pointer; display: flex; justify-content: center; }
        .share-item svg { width: 18px; height: 18px; fill: var(--text-dim); }
        .share-item:hover svg { fill: white; }

        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .2s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: #888; transition: .2s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); background-color: white; }
    </style>
</head>

let currentCat = 0, currentIndex = 0, currentCount = 0, lang = 'ar', favMode = false, favorites = JSON.parse(localStorage.getItem('azkar_favs') || '[]');

window.onload = function() { autoSelectByTime(); render(); };

function autoSelectByTime() {
    const hr = new Date().getHours();
    if (hr >= 5 && hr < 12) currentCat = 1;
    else if (hr >= 16 && hr < 20) currentCat = 2;
    else if (hr >= 20 || hr < 5) currentCat = 3;
    else currentCat = 0;
}

function render() {
    const list = favMode ? favorites : azkarData[currentCat].arabic;
    const transList = favMode ? favorites.map(f => f.t) : azkarData[currentCat].trans;
    const repsList = favMode ? favorites.map(f => f.r) : azkarData[currentCat].reps;
    
    if (favMode && favorites.length === 0) {
        document.getElementById('arabicText').innerText = lang === 'ar' ? "قائمة المفضلة فارغة" : "Favorites list is empty";
        document.getElementById('translationText').innerText = "";
        document.getElementById('progressVal').innerText = "0 / 0";
    } else {
        document.getElementById('arabicText').innerText = favMode ? favorites[currentIndex].a : list[currentIndex];
        document.getElementById('translationText').innerText = favMode ? favorites[currentIndex].t : transList[currentIndex];
        document.getElementById('progressVal').innerText = `${currentIndex + 1} / ${list.length}`;
        document.getElementById('repeatVal').innerText = getRepetitionText(favMode ? favorites[currentIndex].r : repsList[currentIndex], lang);
        
        const isFav = isCurrentlyFav();
        document.getElementById('menuHeart').classList.toggle('fav-active', isFav);
        document.getElementById('scrollArea').setAttribute('data-fav-hint', isFav ? (lang === 'ar' ? "إزالة من المفضلة" : "Remove from Favorites") : (lang === 'ar' ? "إضافة للمفضلة" : "Add to Favorites"));
    }

    document.getElementById('circleCount').innerText = currentCount;
    updateCircleProgress(currentCount, (favMode && favorites.length > 0) ? favorites[currentIndex].r : (list.length > 0 ? azkarData[currentCat].reps[currentIndex] : 1));
    
    const ui = {
        ar: { prog: "التقدم", rep: "التكرار", set1: "صوت", set2: "هزاز", set3: "تلقائي", set4: "الحجم", copy: "نسخ", share: "مشاركة", fav: "مفضلة", refr: "تحديث" },
        en: { prog: "PROGRESS", rep: "REPEAT", set1: "Sound", set2: "Vibrate", set3: "Auto", set4: "Size", copy: "Copy", share: "Share", fav: "Favorite", refr: "Refresh" }
    }[lang];

    document.getElementById('lblProgress').innerText = ui.prog; document.getElementById('lblRepeat').innerText = ui.rep;
    document.getElementById('set1').innerText = ui.set1; document.getElementById('set2').innerText = ui.set2;
    document.getElementById('set3').innerText = ui.set3; document.getElementById('set4').innerText = ui.set4;
    document.getElementById('btnCopy').setAttribute('data-tooltip', ui.copy);
    document.getElementById('menuHeart').setAttribute('data-tooltip', ui.fav);
    
    document.getElementById('tabBar').style.display = favMode ? 'none' : 'grid';
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === currentCat));
    for(let i=0; i<4; i++) document.getElementById('t'+i).innerText = (lang === 'ar') ? azkarData[i].nameAr : azkarData[i].nameEn;
}

function incrementCount() {
    const list = favMode ? favorites : azkarData[currentCat].arabic;
    if (list.length === 0) return;
    const max = favMode ? favorites[currentIndex].r : azkarData[currentCat].reps[currentIndex];
    if (currentCount < max) {
        currentCount++; playTapSound();
        if (currentCount === max) {
            document.getElementById('counterRingCont').classList.add('completed');
            playVibrateSound();
            if(document.getElementById('chkAuto').checked) setTimeout(next, 800);
        }
        render();
    }
}

function next() { 
    const list = favMode ? favorites : azkarData[currentCat].arabic;
    if (list.length > 0) currentIndex = (currentIndex + 1) % list.length;
    resetCounter(); render(); 
}

function prev() { 
    const list = favMode ? favorites : azkarData[currentCat].arabic;
    if (list.length > 0) currentIndex = (currentIndex - 1 + list.length) % list.length;
    resetCounter(); render(); 
}

function resetCounter() { currentCount = 0; document.getElementById('counterRingCont').classList.remove('completed'); }

function changeCat(index) { favMode = false; document.getElementById('viewFavs').classList.remove('active'); currentCat = index; currentIndex = 0; resetCounter(); render(); }

function toggleLang() { lang = (lang === 'ar') ? 'en' : 'ar'; document.getElementById('bodyNode').className = 'lang-' + lang; render(); }

function changeFontSize(v) { document.documentElement.style.setProperty('--base-font-size', v + 'px'); }

function toggleFavMode() { favMode = !favMode; document.getElementById('viewFavs').classList.toggle('active', favMode); currentIndex = 0; resetCounter(); render(); }

function isCurrentlyFav() {
    if (favMode) return true;
    const a = azkarData[currentCat].arabic[currentIndex];
    return favorites.some(f => f.a === a);
}

function toggleFavorite() {
    if (favMode && favorites.length > 0) {
        favorites.splice(currentIndex, 1);
        if (currentIndex >= favorites.length) currentIndex = 0;
    } else {
        const a = azkarData[currentCat].arabic[currentIndex];
        const t = azkarData[currentCat].trans[currentIndex];
        const r = azkarData[currentCat].reps[currentIndex];
        const idx = favorites.findIndex(f => f.a === a);
        if (idx > -1) favorites.splice(idx, 1);
        else favorites.push({a, t, r});
    }
    localStorage.setItem('azkar_favs', JSON.stringify(favorites));
    render();
}

function handleFavShortcut() { toggleFavorite(); }

function copySmart() {
    const text = (lang === 'ar') ? document.getElementById('arabicText').innerText : document.getElementById('translationText').innerText;
    navigator.clipboard.writeText(text);
    const btn = document.getElementById('btnCopy');
    const old = btn.innerHTML;
    btn.innerHTML = '<span style="color:#00ff00; font-size:20px">✔</span>';
    setTimeout(() => btn.innerHTML = old, 1000);
}

function share(plat) {
    const text = document.getElementById('arabicText').innerText;
    const url = encodeURIComponent(window.location.href);
    const msg = encodeURIComponent(text);
    const links = {
        tw: `https://twitter.com/intent/tweet?text=${msg}`,
        fb: `https://www.facebook.com/sharer/sharer.php?u=${url}`,
        wa: `https://api.whatsapp.com/send?text=${msg}`,
        tg: `https://t.me/share/url?url=${url}&text=${msg}`
    };
    window.open(links[plat], '_blank');
}

function updateCircleProgress(c, m) {
    const ring = document.getElementById('progressRing');
    const offset = 238.76 - (c / m * 238.76);
    ring.style.strokeDashoffset = offset;
}

function getRepetitionText(c, l) {
    if (l === 'en') return c === 1 ? "1 Time" : c + " Times";
    const m = {1:"مرة واحدة", 2:"مرتان", 3:"٣ مرات", 33:"٣٣ مرة", 34:"٣٤ مرة", 100:"١٠٠ مرة"};
    return m[c] || c + " مرات";
}

function toggleUnifiedMenu() { document.getElementById('unifiedMenu').classList.toggle('show'); }
function applyTheme(bg, acc, el) {
    document.documentElement.style.setProperty('--bg', bg);
    document.documentElement.style.setProperty('--accent', acc);
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
    el.classList.add('active');
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTapSound() {
    if(!document.getElementById('chkClick').checked) return;
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.frequency.setValueAtTime(600, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.1);
}
function playVibrateSound() {
    if(!document.getElementById('chkVibrate').checked) return;
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'square'; o.frequency.setValueAtTime(150, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.3);
    if(navigator.vibrate) navigator.vibrate(100);
}

const iconGallery = ["https://cdn-icons-png.flaticon.com/128/4354/4354959.png","https://cdn-icons-png.flaticon.com/128/7321/7321058.png","https://cdn-icons-png.flaticon.com/128/3004/3004949.png","https://cdn-icons-png.flaticon.com/128/6152/6152858.png","https://cdn-icons-png.flaticon.com/128/13773/13773984.png"];
let currentIconIdx = 4;
function changeIcon() { currentIconIdx = (currentIconIdx + 1) % iconGallery.length; document.getElementById('cycleIcon').src = iconGallery[currentIconIdx]; }
