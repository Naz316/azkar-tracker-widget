<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azkar Tracker Notion</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #3B1414;
            --accent: #cc0000;
            --card: rgba(255, 255, 255, 0.05);
            --text: #FFFFFF;
            --text-dim: #B1A2C1;
            --font-arabic: 'Amiri', serif;
            --base-font-size: 22px; /* Controlled by slider */
        }

        * { box-sizing: border-box; }

        body {
            background: transparent;
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            display: flex;
            justify-content: center;
        }

        .widget {
            width: 100%;
            height: 100vh;
            background-color: var(--bg);
            padding: 20px;
            display: flex; flex-direction: column;
            position: relative;
            transition: background-color 0.3s ease;
            border: none; 
        }

        /* HEADER */
        .header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            height: 60px;
            margin-bottom: 10px;
            z-index: 100;
        }
        .header-left { display: flex; justify-content: flex-start; }
        .header-right { display: flex; justify-content: flex-end; }
        .icon-btn {
            background: none; border: none; cursor: pointer;
            width: 42px; height: 42px; padding: 0;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 32px;
        }
        .icon-btn img { width: 36px; height: 36px; object-fit: contain; }

        .floating-icon {
            width: 65px; height: 65px;
            cursor: pointer;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* TABS */
        .tabs {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 8px; margin-bottom: 15px;
        }
        .tab {
            background: transparent; border: none; color: var(--text-dim);
            padding: 12px 2px; border-radius: 14px; cursor: pointer;
            font-size: 13px; font-weight: 700; text-align: center;
            transition: 0.15s; display: flex; flex-direction: column; align-items: center;
        }
        .tab.active { background: var(--accent); color: white; }
        .tab span { font-size: 26px; margin-bottom: 4px; }

        /* MAIN CONTENT */
        .main-display {
            flex-grow: 1; overflow-y: auto; padding: 20px;
            text-align: center; display: flex; flex-direction: column;
            background: rgba(0,0,0,0.15); border-radius: 20px;
            margin-bottom: 15px;
            justify-content: flex-start;
        }
        
        .arabic {
            font-family: var(--font-arabic); 
            direction: rtl; line-height: 1.7; margin-bottom: 15px;
            white-space: pre-wrap;
            transition: all 0.3s ease;
        }
        .translation { 
            line-height: 1.5;
            transition: all 0.3s ease;
        }

        /* Dynamic Typography */
        .lang-ar .arabic { font-size: var(--base-font-size); color: var(--text); font-weight: 700; }
        .lang-ar .translation { font-size: calc(var(--base-font-size) * 0.65); color: var(--text-dim); font-weight: 400; }
        .lang-en .arabic { font-size: calc(var(--base-font-size) * 0.8); color: var(--text-dim); font-weight: 400; }
        .lang-en .translation { font-size: calc(var(--base-font-size) * 0.85); color: var(--text); font-weight: 700; }

        /* FOOTER */
        .footer-controls {
            display: flex; justify-content: space-between; align-items: center;
            height: 90px; flex-shrink: 0;
        }
        .side-info { flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 90px; }
        .info-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; height: 16px; margin-bottom: 4px;}
        .info-value { font-size: 16px; color: var(--text); font-weight: 700; white-space: nowrap; }

        /* COMPLETION GLOW */
        .counter-container {
            position: relative; width: 80px; height: 80px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; margin: 0 10px;
            border-radius: 50%;
            transition: 0.3s;
        }
        .counter-container.completed {
            box-shadow: 0 0 20px var(--accent);
            animation: pulse-glow 1.5s infinite;
        }
        @keyframes pulse-glow {
            0% { transform: scale(1); box-shadow: 0 0 10px var(--accent); }
            50% { transform: scale(1.05); box-shadow: 0 0 25px var(--accent); }
            100% { transform: scale(1); box-shadow: 0 0 10px var(--accent); }
        }

        .counter-container svg { position: absolute; transform: rotate(-90deg); width: 100%; height: 100%; }
        .circle-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 6; }
        .circle-progress { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.15s ease; }
        #circleCount { font-size: 28px; font-weight: 700; color: var(--text); z-index: 2; }

        .nav-btn { background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; padding: 10px; }

        /* MENU POPOVER */
        .menu-popover {
            position: absolute; top: 75px; right: 20px;
            background: #1A1A1A; padding: 18px; border-radius: 16px;
            visibility: hidden; opacity: 0; transition: 0.1s; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            width: 260px;
        }
        .menu-popover.show { visibility: visible; opacity: 1; }
        
        .menu-section-title { color: white; font-size: 14px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .menu-divider { height: 2px; background: rgba(255,255,255,0.3); margin: 0 0 15px 0; border: none; width: 100%; }
        
        /* COLOR DOTS ORDERED AS REQUESTED */
        .color-menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .color-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); transition: 0.15s; display: flex; align-items: center; justify-content: center; }
        .color-dot.active { border-color: white; }
        .color-dot.active::after { content: '✓'; color: white; font-size: 12px; font-weight: bold; }

        /* SETTINGS ELEMENTS */
        .settings-rows { display: flex; flex-direction: column; gap: 12px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; color: white; font-size: 13px; font-weight: 600; }
        .setting-label { display: flex; align-items: center; gap: 8px; }
        
        /* Font Slider */
        .font-slider { width: 100px; cursor: pointer; accent-color: var(--accent); }

        /* Action Buttons Container */
        .action-buttons {
            display: flex; gap: 10px; margin-top: 10px; padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .action-btn {
            flex: 1; height: 40px; border-radius: 10px; border: none;
            background: var(--accent); color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; transition: 0.2s; position: relative;
        }
        .action-btn:hover { filter: brightness(1.2); }
        
        /* Custom Tooltip */
        .action-btn::before {
            content: attr(data-tooltip);
            position: absolute; bottom: 45px; background: #333;
            color: white; font-size: 10px; padding: 4px 8px;
            border-radius: 4px; white-space: nowrap; visibility: hidden; opacity: 0;
            transition: 0.2s; pointer-events: none;
        }
        .action-btn:hover::before { visibility: visible; opacity: 1; }

        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .15s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: #888; transition: .15s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); background-color: white; }

        .main-display::-webkit-scrollbar { width: 4px; }
        .main-display::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body class="lang-ar" id="bodyNode">

<div class="widget">
    <div class="header">
        <div class="header-left">
            <button class="icon-btn" onclick="toggleLang()">
                <img src="https://cdn-icons-png.flaticon.com/128/6212/6212766.png" alt="Language">
            </button>
        </div>
        <div class="header-center">
            <img id="cycleIcon" class="floating-icon" src="https://cdn-icons-png.flaticon.com/128/13773/13773984.png" onclick="changeIcon()" alt="Icon">
        </div>
        <div class="header-right">
            <button class="icon-btn" onclick="toggleUnifiedMenu()">☰</button>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab" id="tab0" onclick="changeCat(0)"><span>🛌</span><label id="t0">Waking</label></button>
        <button class="tab" id="tab1" onclick="changeCat(1)"><span>☀️</span><label id="t1">Morning</label></button>
        <button class="tab" id="tab2" onclick="changeCat(2)"><span>🌆</span><label id="t2">Evening</label></button>
        <button class="tab" id="tab3" onclick="changeCat(3)"><span>🌙</span><label id="t3">Sleep</label></button>
    </div>

    <div class="main-display" id="scrollArea">
        <div class="arabic" id="arabicText"></div>
        <div class="translation" id="translationText"></div>
    </div>

    <div class="footer-controls">
        <button class="nav-btn" onclick="prev()">❮</button>
        <div class="side-info">
            <span class="info-label" id="lblProgress">PROGRESS</span>
            <span class="info-value" id="progressVal">1 / 5</span>
        </div>

        <div id="counterCont" class="counter-container" onclick="incrementCount()">
            <svg viewBox="0 0 85 85">
                <circle class="circle-bg" cx="42.5" cy="42.5" r="38"></circle>
                <circle id="progressRing" class="circle-progress" cx="42.5" cy="42.5" r="38"></circle>
            </svg>
            <div id="circleCount">0</div>
        </div>

        <div class="side-info">
            <span class="info-label" id="lblRepeat">REPEAT</span>
            <span class="info-value" id="repeatVal">مرة واحدة</span>
        </div>
        <button class="nav-btn" onclick="next()">❯</button>
    </div>

    <div class="menu-popover" id="unifiedMenu">
        <div class="menu-section-title"><span>🎨</span><span id="menuTitleColors">Colors</span></div>
        <hr class="menu-divider">
        <div class="color-menu">
            <div class="color-dot active" data-en="Red" data-ar="أحمر" style="background:#cc0000" onclick="applyTheme('#3B1414', '#cc0000', this)"></div>
            <div class="color-dot" data-en="Purple" data-ar="بنفسجي" style="background:#800080" onclick="applyTheme('#1E122C', '#800080', this)"></div>
            <div class="color-dot" data-en="Blue" data-ar="أزرق" style="background:#0066cc" onclick="applyTheme('#0A192F', '#0066cc', this)"></div>
            <div class="color-dot" data-en="Brown" data-ar="بني" style="background:#663300" onclick="applyTheme('#2D1B0D', '#8B4513', this)"></div>
            <div class="color-dot" data-en="Yellow" data-ar="أصفر" style="background:#ffcc00" onclick="applyTheme('#332B00', '#ffcc00', this)"></div>
            <div class="color-dot" data-en="Black" data-ar="أسود" style="background:#000000" onclick="applyTheme('#000000', '#444444', this)"></div>
            <div class="color-dot" data-en="Gray" data-ar="رمادي" style="background:#808080" onclick="applyTheme('#222222', '#808080', this)"></div>
            <div class="color-dot" data-en="Midnight Slate" data-ar="سحابي داكن" style="background:#334155" onclick="applyTheme('#1a202c', '#334155', this)"></div>
            <div class="color-dot" data-en="Pink" data-ar="وردي" style="background:#ff66b2" onclick="applyTheme('#331122', '#ff66b2', this)"></div>
            <div class="color-dot" data-en="Green" data-ar="أخضر" style="background:#228b22" onclick="applyTheme('#0D2612', '#228b22', this)"></div>
            <div class="color-dot" data-en="Orange" data-ar="برتقالي" style="background:#ff8c00" onclick="applyTheme('#2E1A00', '#ff8c00', this)"></div>
            <div class="color-dot" data-en="Teal" data-ar="تركوازي" style="background:#008080" onclick="applyTheme('#002222', '#008080', this)"></div>
        </div>
        <div class="menu-section-title"><span>⚙️</span><span id="menuTitleSettings">Settings</span></div>
        <hr class="menu-divider">
        <div class="settings-rows">
            <div class="setting-row">
                <div class="setting-label"><span>🔊</span><span id="set1">Click Sound</span></div>
                <label class="switch"><input type="checkbox" id="chkClick" checked><span class="slider"></span></label>
            </div>
            <div class="setting-row">
                <div class="setting-label"><span>📳</span><span id="set2">Vibration</span></div>
                <label class="switch"><input type="checkbox" id="chkVibrate" checked><span class="slider"></span></label>
            </div>
            <div class="setting-row">
                <div class="setting-label"><span>🔄</span><span id="set3">Auto Transfer</span></div>
                <label class="switch"><input type="checkbox" id="chkAuto" checked><span class="slider"></span></label>
            </div>
            <div class="setting-row">
                <div class="setting-label"><span>📏</span><span id="set4">Font Size</span></div>
                <input type="range" min="16" max="32" value="22" class="font-slider" oninput="changeFontSize(this.value)">
            </div>
            <div class="action-buttons">
                <button class="action-btn" id="btnCopy" onclick="copyZikr()" data-tooltip="Copy Zikr">📋</button>
                <button class="action-btn" id="btnRefresh" onclick="location.reload()" data-tooltip="Refresh Widget">🔄</button>
            </div>
        </div>
    </div>
</div>

<script>
// --- DATA ---
const azkarData = [
    {
        nameEn: "Waking Up", nameAr: "الاستيقاظ",
        arabic: ["لَا إِلٰهَ إِلاَّ اللّٰهُ الْوَاحِدُ الْقَهَّارُ ، رَبُّ السَّمٰـوٰتِ وَالْأَرْضِ وَمَا بَيْنَهُمَا الْعَزِيْزُ الْغَفَّارُ","لَا إِلَهَ إِلَّا اللّٰهُ وَحْدَهُ لَا شَرِيْكَ لَهُ ، لَهُ الْمُلْكُ ، وَلَهُ الْحَمْدُ ، وَهُوَ عَلَىٰ كُلِّ شَيْءٍ قَدِيْرٌ‏ ، اَلْحَمْدُ لِلّٰهِ‏ ، وَسُبْحَانَ اللّٰهِ ، وَلَا إِلٰهَ إِلَّا اللّٰهُ ، وَاللّٰهُ أَكْبَرُ ، وَلَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللّٰهِ ، اَللّٰهُمَّ اغْفِرْ لِيْ.","اَلْحَمْدُ لِلّٰهِ الَّذِيْ عَافَانِيْ فِيْ جَسَدِيْ ، وَرَدَّ عَليَّ رُوْحِيْ ، وَأَذِنَ لِييْ بِذِكْرِهِ.","اَلْحَمْدُ لِلّٰهِ الَّذِيْ أَحْيَانَا بَعْدَ مَا أَمَاتَنَا وَإِلَيْهِ النُّشُوْرُ","إِنَّ فِىْ خَلْقِ السَّمـٰوٰتِ وَالْأَرْضِ وَاخْتِلٰـفِ الَّيْلِ وَالنَّهارِ لاٰيٰاتٍ لِّأُولِى الْأَلْبَـٰبِ. الَّذِيْنَ يَذْكُرُوْنَ اللّٰهَ قِيَـٰمًا وَّقُعُوْدًا وَّعَلَىٰ جُنُوْبِهِمْ وَيَتَفَكَّرُوْنَ فِىْ خَلْقِ السَّمـٰوٰتِ وَالْأَرْضِ ، رَبَّنَا مَا خَلَقْتَ هَـٰذَا بٰطِلًا ، سُبْحٰنَكَ فَقِنَا عَذَابَ النَّارِ. رَبَّنَآ إِنَّكَ مَنْ تُدْخِلِ النَّارَ فَقَدْ أَخْزَيْتَهُۥ ۖ ، وَمَا لِلظّـٰلِمِيْنَ مِنْ أَنصَارٍ. رَبَّنَآ إِنَّنَا سَمِعْنَا مُنَادِيًا يُّنَادِىْ لِلْإِيْمَـٰنِ أَنْ اٰمِنُوْا بِرَبِّكُمْ فَاٰمَنَّا ۚ ، رَبَّنَا فَاغْفِرْ لَنَا ذُنُوْبَنَا وَكَفِّرْ عَنَّا سَيِّـاٰتِنَا وَتَوَفَّنَا مَعَ الْأَبْرَارِ. رَبَّنَا وَاٰتِنَا مَا وَعَدْتَّنَا عَلَىٰ رُسُلِكَ وَلَا تُخْزِنَا يَوْمَ الْقِيـٰمَةِ ۗ ، إِنَّكَ لَا تُخْلِفُ الْمِيْعَادَ. فَاسْتَجَابَ لَهُمْ رَبُّهُمْ أَنِّىْ لَآ أُضِيْعُ عَمَلَ عَـامِلٍ مِّنْكُمْ مِّنْ ذَكَرٍ أَوْ أُنثَىٰ ۖ ، بَعْضُكُمْ مِّنۢ بَعْضٍ ۖ ، فَالَّذِيْنَ هَاجَرُوْا وَأُخْرِجُوْا مِن دِيَارِهِمْ وَأُوْذُوْا فِىْ سَبِيْلِىْ وَقٰتَلُوْا وَقُتِلُوْا لَأُكَفِّرَنَّ عَنْهُمْ سَيِّاٰتِهِمْ وَلَأُدْخِلَنَّهُمْ جَنَّـٰتٍ تَجْرِىْ مِنْ تَحْتِهَا الْأَنْهٰرُ ، ثَوَابًا مِّنْ عِندِ اللّٰهِ ۗ ، وَاللّٰهُ عِندَهُۥ حُسْنُ الثَّوَابِ. لَا يَغُرَّنَّكَ تَقَلُّبُ الَّذِيْنَ كَفَرُوْا فِىْ الْبِلَـٰدِ ، مَتاَعٌ قَلِيْلٌ ثُمَّ مَأْوٰهُمْ جَهَنَّمُ ۚ وَبِئْسَ الْمِهَادُ. لٰكِنِ الَّذِيْنَ اتَّقَوْا رَبَّهُمْ لَهُمْ جَنَّـٰتٍ تَجْرِىْ مِنْ تَحْتِهَا الْأَنْهٰرُ خٰلِدِيْنَ فِيْهَا نُزُلًا مِّنْ عِنْدِ اللّٰهِ ۗ ، وَمَا عِنْدَ اللّٰهِ خَيْرٌ لِّلْأَبْرَارِ. وَإِنَّ مِنْ أَهْلِ الْكِتٰبِ لَمَنْ يُّؤْمِنُ بِاللّٰهِ وَمَآ أُنْزِلَ إِلَيْكُمْ وَمَآ أُنْزِلَ إِلَيْهِمْ خٰشِعِيْنَ لِلّٰهِ لَا يَشْتَرُوْنَ بِاٰيٰتِ اللّٰهِ ثَمَنًا قَلِيْلًا ۗ ، أُولـٰٓئِكَ لَهُمْ أَجْرُهُمْ عِنْدَ رَبِّهِمْ ۗ ، إِنَّ اللّٰهَ سَرِيْعُ الْحِسَابِ. يَـٰٓأَيُّهَا الَّذِيْنَ اٰمَنُوا اصْبِرُوْا وَصَابِرُوْا وَرَابِطُوْا وَاتَّقُوا اللّٰهَ لَعَلَّكُمْ تُفْلِحُونَ."],
        trans: ["There is no god worthy of worship but Allah: The One, The All-Dominant; Lord of the heavens, the earth and whatever is between them; The Mighty, The Most Forgiving.","There is no god worthy of worship but Allah. He is Alone and He has no partner whatsoever. To Him Alone belong all sovereignty and all praise. He is over all things All-Powerful. All praise be to Allah and Allah is free from imperfection. There is no god but Allah. Allah is the Greatest. There is no power (in averting evil) or strength (in attaining good) except through Allah. O Allah, forgive me.","All praise is for Allah Who granted me well-being in my body, and returned my soul to me and allowed me to remember Him.","All praise is for Allah who gave us life after having taken it from us, and unto Him is the resurrection.","Indeed, in the creation of the heavens and the earth and the alternation of the day and night there are signs for people of reason... (3:190-200)"],

    {
        nameEn: "Morning", nameAr: "الصباح",

        trans: ["Ayat al-Kursi (2:255)","Surah al-Ikhlas","Surah al-Falaq","Surah al-Nas","Sayyid al-Istighfar"],

    {

        arabic: ["أَعُوْذُ بِاللّٰهِ مِنَ الشَّيْطَانِ الرَّجِيْمِ. اَللّٰهُ لَآ إِلٰهَ إِلَّا هُوَ الْحَىُّ الْقَيُّوْمُ...","بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ. قُلْ هُوَ اللّٰهُ أَحَدٌ...","بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ. قُلْ أَعُوْذُ بِرَبِّ الْفَلَقِ...","بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ. قُلْ أَعُوْذُ بِرَبِّ النَّاسِ...","اَللّٰهُمَّ أَنْتَ رَبِّيْ لَا إِلٰهَ إِلَّا أَنْتَ ، خَلَقْتَنِيْ وَأَنَا عَبْدُكَ..."],

        trans: ["Ayat al-Kursi (2:255)","Last 2 verses of al-Baqarah","Surah al-Kafirun","Surah al-Ikhlas","Surah al-Falaq"],

let currentCat = 0, currentIndex = 0, currentCount = 0, lang = 'ar';
const circleRadius = 38;
const circleCircumference = 2 * Math.PI * circleRadius;

// --- INITIALIZATION ---
window.onload = function() {
    autoSelectCategory();
    render();
};

function autoSelectCategory() {
    const hr = new Date().getHours();
    if (hr >= 5 && hr < 12) currentCat = 1; // Morning
    else if (hr >= 16 && hr < 20) currentCat = 2; // Evening
    else if (hr >= 20 || hr < 5) currentCat = 3; // Sleep
    else currentCat = 0; // Waking/General
}

function updateCircleProgress(count, max) {
    const ring = document.getElementById('progressRing');
    const cont = document.getElementById('counterCont');
    const progress = count / max;
    const offset = circleCircumference - (progress * circleCircumference);
    ring.style.strokeDashoffset = offset;
    
    // Feature 3: Glow on completion
    if (count === max) cont.classList.add('completed');
    else cont.classList.remove('completed');
}

function getRepetitionText(count, currentLang) {
    if (currentLang === 'en') return count === 1 ? "1 Time" : count + " Times";
    const reps = {1:"مرة واحدة", 2:"مرتان", 3:"٣ مرات", 33:"٣٣ مرة", 100:"١٠٠ مرة"};
    return reps[count] || count + " مرات";
}

function render() {
    const category = azkarData[currentCat];
    document.getElementById('arabicText').innerText = category.arabic[currentIndex];
    document.getElementById('translationText').innerText = category.trans[currentIndex];
    document.getElementById('progressVal').innerText = `${currentIndex + 1} / ${category.arabic.length}`;
    document.getElementById('repeatVal').innerText = getRepetitionText(category.reps[currentIndex], lang);
    document.getElementById('circleCount').innerText = currentCount;
    
    // UI Translations
    const ui = {
        ar: { prog: "التقدم", rep: "التكرار", col: "الألوان", set: "الإعدادات", s1: "صوت النقرة", s2: "اهتزاز", s3: "تحويل تلقائي", s4: "حجم الخط", copy: "نسخ الذكر", refr: "تحديث الأداة" },
        en: { prog: "PROGRESS", rep: "REPEAT", col: "Colors", set: "Settings", s1: "Click Sound", s2: "Vibration", s3: "Auto Transfer", s4: "Font Size", copy: "Copy Zikr", refr: "Refresh Widget" }
    }[lang];

    document.getElementById('lblProgress').innerText = ui.prog;
    document.getElementById('lblRepeat').innerText = ui.rep;
    document.getElementById('menuTitleColors').innerText = ui.col;
    document.getElementById('menuTitleSettings').innerText = ui.set;
    document.getElementById('set1').innerText = ui.s1;
    document.getElementById('set2').innerText = ui.s2;
    document.getElementById('set3').innerText = ui.s3;
    document.getElementById('set4').innerText = ui.s4;
    document.getElementById('btnCopy').setAttribute('data-tooltip', ui.copy);
    document.getElementById('btnRefresh').setAttribute('data-tooltip', ui.refr);

    updateCircleProgress(currentCount, category.reps[currentIndex]);
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === currentCat));
    for(let i=0; i<4; i++) document.getElementById('t'+i).innerText = (lang === 'ar') ? azkarData[i].nameAr : azkarData[i].nameEn;
    document.getElementById('scrollArea').scrollTop = 0;
}

function incrementCount() {
    const max = azkarData[currentCat].reps[currentIndex];
    if (currentCount < max) {
        currentCount++;
        playTapSound();
        render();
        if (currentCount === max) {
            playVibrateSound();
            if(document.getElementById('chkAuto').checked) setTimeout(next, 600);
        }
    }
}

function next() { currentIndex = (currentIndex + 1) % azkarData[currentCat].arabic.length; currentCount = 0; render(); }
function prev() { currentIndex = (currentIndex - 1 + azkarData[currentCat].arabic.length) % azkarData[currentCat].arabic.length; currentCount = 0; render(); }
function changeCat(index) { currentCat = index; currentIndex = 0; currentCount = 0; render(); }

function toggleLang() { 
    lang = (lang === 'ar') ? 'en' : 'ar'; 
    document.getElementById('bodyNode').className = 'lang-' + lang;
    render(); 
}

function changeFontSize(val) {
    document.documentElement.style.setProperty('--base-font-size', val + 'px');
}

function copyZikr() {
    const txt = azkarData[currentCat].arabic[currentIndex];
    navigator.clipboard.writeText(txt);
    const btn = document.getElementById('btnCopy');
    const old = btn.innerText;
    btn.innerText = "✅";
    setTimeout(() => btn.innerText = "📋", 1000);
}

function toggleUnifiedMenu() { document.getElementById('unifiedMenu').classList.toggle('show'); }

function applyTheme(bg, acc, element) {
    const root = document.documentElement;
    root.style.setProperty('--bg', bg);
    root.style.setProperty('--accent', acc);
    document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active'));
    element.classList.add('active');
}

// Sound logic
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTapSound() {
    if(!document.getElementById('chkClick').checked) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}
function playVibrateSound() {
    if(!document.getElementById('chkVibrate').checked) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(120, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
}

    "https://cdn-icons-png.flaticon.com/128/4354/4354959.png",
    "https://cdn-icons-png.flaticon.com/128/7321/7321058.png",
    "https://cdn-icons-png.flaticon.com/128/3004/3004949.png",
    "https://cdn-icons-png.flaticon.com/128/6152/6152858.png",
    "https://cdn-icons-png.flaticon.com/128/13773/13773984.png"
];
let currentIconIdx = 4;
function changeIcon() {
    currentIconIdx = (currentIconIdx + 1) % iconGallery.length;
    document.getElementById('cycleIcon').src = iconGallery[currentIconIdx];
}
