<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azkar Master Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1E122C;
            --accent: #7446A0;
            --card: rgba(255, 255, 255, 0.05);
            --text: #FFFFFF;
            --text-dim: #B1A2C1;
            --font-arabic: 'Amiri', serif;
        }

        body {
            background: #121212;
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
        }

        .widget {
            width: 95%; max-width: 500px; height: 92vh;
            background-color: var(--bg);
            border-radius: 32px; padding: 25px;
            display: flex; flex-direction: column;
            position: relative; box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            transition: background 0.4s ease;
        }

        /* HEADER */
        .header {
            display: grid;
            grid-template-columns: 80px 1fr 80px;
            align-items: center;
            height: 60px;
            margin-bottom: 15px;
            z-index: 100;
        }
        
        /* ICONS SIZE & ALIGNMENT */
        .icon-btn {
            background: none; border: none; cursor: pointer;
            width: 32px; height: 32px; padding: 0;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .icon-btn img { width: 30px; height: 30px; object-fit: contain; }
        .palette-emoji, .settings-emoji { font-size: 24px; line-height: 1; }
        .icon-btn:hover { transform: scale(1.1); }

        .header-center { display: flex; justify-content: center; }
        .floating-icon {
            width: 70px; height: 70px;
            cursor: pointer;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.4));
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* TABS */
        .tabs {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 8px; margin-bottom: 15px;
        }
        .tab {
            background: transparent; border: none; color: var(--text-dim);
            padding: 8px 2px; border-radius: 12px; cursor: pointer;
            font-size: 10px; font-weight: 700; text-align: center;
            transition: 0.3s; display: flex; flex-direction: column; align-items: center;
        }
        .tab.active { background: var(--accent); color: white; }
        .tab span { font-size: 20px; margin-bottom: 2px; }

        /* MAIN CONTENT */
        .main-display {
            flex-grow: 1; overflow-y: auto; padding: 20px;
            text-align: center; display: flex; flex-direction: column;
            background: rgba(0,0,0,0.15); border-radius: 20px;
            margin-bottom: 15px;
            justify-content: flex-start;
        }
        .arabic {
            font-family: var(--font-arabic); font-size: 22px; color: var(--text);
            direction: rtl; line-height: 1.7; margin-bottom: 15px;
            white-space: pre-wrap;
        }
        .translation { font-size: 14px; color: var(--text-dim); line-height: 1.5; }

        /* FOOTER */
        .footer-controls {
            display: flex; justify-content: space-between; align-items: center;
            height: 100px;
        }
        .side-info { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .info-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .info-value { font-size: 14px; color: var(--text); font-weight: 700; white-space: nowrap; }

        .counter-container {
            position: relative; width: 85px; height: 85px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; margin: 0 10px;
        }
        .counter-container svg { position: absolute; transform: rotate(-90deg); width: 100%; height: 100%; }
        .circle-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 6; }
        .circle-progress { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.3s ease; }
        #circleCount { font-size: 28px; font-weight: 700; color: var(--text); z-index: 2; }

        .nav-btn { background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; padding: 10px; }

        /* BOTTOM LEFT ICONS CONTAINER */
        .bottom-left-icons {
            position: absolute; bottom: 25px; left: 25px;
            display: flex; gap: 12px; align-items: center;
        }

        /* MENUS */
        .menu-popover {
            position: absolute; background: #1A1A1A; padding: 15px; border-radius: 16px;
            visibility: hidden; opacity: 0; transition: 0.3s; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
        }
        .menu-popover.show { visibility: visible; opacity: 1; }
        
        .color-menu { top: 70px; left: 25px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .settings-menu { bottom: 70px; left: 25px; width: 200px; display: flex; flex-direction: column; gap: 15px; }

        .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        
        /* QUICK COLOR NAMES TOOLTIP */
        .color-dot:hover::after {
            content: attr(data-name);
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
            background: black; color: white; padding: 2px 8px; border-radius: 4px;
            font-size: 10px; white-space: nowrap; z-index: 10;
        }

        .setting-row { display: flex; justify-content: space-between; align-items: center; color: white; font-size: 13px; font-weight: 600; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: #888; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); background-color: white; }

        .main-display::-webkit-scrollbar { width: 4px; }
        .main-display::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="widget">
    <!-- Header with Palette and Floating Icon -->
    <div class="header">
        <div class="header-left">
            <button class="icon-btn palette-emoji" onclick="toggleMenu('colorMenu')">🎨</button>
        </div>
        <div class="header-center">
            <img id="cycleIcon" class="floating-icon" src="https://cdn-icons-png.flaticon.com/128/4354/4354959.png" onclick="changeIcon()" alt="Icon">
        </div>
        <div class="header-right"></div>
    </div>
    
    <div class="tabs">
        <button class="tab active" onclick="changeCat(0)"><span>🛌</span><label id="t0">Waking</label></button>
        <button class="tab" onclick="changeCat(1)"><span>☀️</span><label id="t1">Morning</label></button>
        <button class="tab" onclick="changeCat(2)"><span>🌆</span><label id="t2">Evening</label></button>
        <button class="tab" onclick="changeCat(3)"><span>🌙</span><label id="t3">Sleep</label></button>
    </div>

    <div class="main-display" id="scrollArea">
        <div class="arabic" id="arabicText"></div>
        <div class="translation" id="translationText"></div>
    </div>

    <div class="footer-controls">
        <!-- Spacer for the absolutely positioned bottom-left icons -->
        <div style="width: 80px;"></div> 

        <div class="side-info">
            <span class="info-label" id="lblProgress">PROGRESS</span>
            <span class="info-value" id="progressVal">1 / 5</span>
        </div>

        <div class="counter-container" onclick="incrementCount()">
            <svg>
                <circle class="circle-bg" cx="42.5" cy="42.5" r="38"></circle>
                <circle id="progressRing" class="circle-progress" cx="42.5" cy="42.5" r="38"></circle>
            </svg>
            <div id="circleCount">0</div>
        </div>

        <div class="side-info">
            <span class="info-label" id="lblRepeat">REPEAT</span>
            <span class="info-value" id="repeatVal">مرة واحدة</span>
        </div>
        
        <div style="display: flex; gap: 5px;">
            <button class="nav-btn" onclick="prev()">❮</button>
            <button class="nav-btn" onclick="next()">❯</button>
        </div>
    </div>

    <!-- Bottom Left Controls (Language & Settings) -->
    <div class="bottom-left-icons">
        <button class="icon-btn" onclick="toggleLang()">
            <img src="https://cdn-icons-png.flaticon.com/128/6212/6212766.png" alt="Language">
        </button>
        <button class="icon-btn settings-emoji" onclick="toggleMenu('settingsMenu')">⚙️</button>
    </div>

    <!-- COLOR MENU -->
    <div class="menu-popover color-menu" id="colorMenu">
        <div class="color-dot" data-en="Red" data-ar="أحمر" style="background:#cc0000" onclick="applyTheme('#3B1414', '#cc0000')"></div>
        <div class="color-dot" data-en="Blue" data-ar="أزرق" style="background:#0066cc" onclick="applyTheme('#0A192F', '#0066cc')"></div>
        <div class="color-dot" data-en="Brown" data-ar="بني" style="background:#663300" onclick="applyTheme('#2D1B0D', '#8B4513')"></div>
        <div class="color-dot" data-en="Yellow" data-ar="أصفر" style="background:#ffcc00" onclick="applyTheme('#332B00', '#ffcc00')"></div>
        <div class="color-dot" data-en="Black" data-ar="أسود" style="background:#000000" onclick="applyTheme('#000000', '#444444')"></div>
        <div class="color-dot" data-en="Gray" data-ar="رمادي" style="background:#808080" onclick="applyTheme('#222222', '#808080')"></div>
        <div class="color-dot" data-en="Cloud" data-ar="أبيض" style="background:#ffffff" onclick="applyTheme('#f5f5f5', '#7446A0', true)"></div>
        <div class="color-dot" data-en="Pink" data-ar="وردي" style="background:#ff66b2" onclick="applyTheme('#331122', '#ff66b2')"></div>
        <div class="color-dot" data-en="Green" data-ar="أخضر" style="background:#228b22" onclick="applyTheme('#0D2612', '#228b22')"></div>
        <div class="color-dot" data-en="Purple" data-ar="بنفسجي" style="background:#800080" onclick="applyTheme('#1E122C', '#800080')"></div>
        <div class="color-dot" data-en="Orange" data-ar="برتقالي" style="background:#ff8c00" onclick="applyTheme('#2E1A00', '#ff8c00')"></div>
        <div class="color-dot" data-en="Teal" data-ar="تركواز" style="background:#008080" onclick="applyTheme('#002222', '#008080')"></div>
    </div>

    <!-- SETTINGS MENU -->
    <div class="menu-popover settings-menu" id="settingsMenu">
        <div class="setting-row"><span id="set1">Click Sound</span><label class="switch"><input type="checkbox" id="chkClick" checked><span class="slider"></span></label></div>
        <div class="setting-row"><span id="set2">Vibration Sound</span><label class="switch"><input type="checkbox" id="chkVibrate" checked><span class="slider"></span></label></div>
        <div class="setting-row"><span id="set3">Auto Transfer</span><label class="switch"><input type="checkbox" id="chkAuto" checked><span class="slider"></span></label></div>
    </div>
</div>

<script>
// --- AUDIO ENGINE ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTapSound() {
    if(!document.getElementById('chkClick').checked) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

function playVibrateSound() {
    if(!document.getElementById('chkVibrate').checked) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square'; osc.frequency.setValueAtTime(120, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.4);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
}

const iconGallery = [
    "https://cdn-icons-png.flaticon.com/128/4354/4354959.png",
    "https://cdn-icons-png.flaticon.com/128/7321/7321058.png",
    "https://cdn-icons-png.flaticon.com/128/3004/3004949.png",
    "https://cdn-icons-png.flaticon.com/128/6152/6152858.png",
    "https://cdn-icons-png.flaticon.com/128/13773/13773984.png"
];
let currentIconIdx = 0;
function changeIcon() {
    currentIconIdx = (currentIconIdx + 1) % iconGallery.length;
    document.getElementById('cycleIcon').src = iconGallery[currentIconIdx];
}

const azkarData = [
    { nameEn: "Waking Up", nameAr: "الاستيقاظ", arabic: ["لَا إِلٰهَ إِلاَّ اللّٰهُ الْوَاحِدُ الْقَهَّارُ..."], trans: ["There is no god..."], reps: [1] },
    { nameEn: "Morning", nameAr: "الصباح", arabic: ["أَعُوْذُ بِاللّٰهِ مِنَ الشَّيْطَانِ الرَّجِيْمِ..."], trans: ["I seek protection..."], reps: [1] },
    { nameEn: "Evening", nameAr: "المساء", arabic: ["أَعُوْذُ بِاللّٰهِ مِنَ الشَّيْطَانِ الرَّجِيْمِ..."], trans: ["I seek protection..."], reps: [1] },
    { nameEn: "Sleep", nameAr: "النوم", arabic: ["أَعُوْذُ بِاللّٰهِ مِنَ الشَّيْطَانِ الرَّجِيْمِ..."], trans: ["I seek protection..."], reps: [1] }
];

// Note: I have truncated the azkarData array for space, but in your actual implementation, use your full 100+ entry list.

let currentCat = 0, currentIndex = 0, currentCount = 0, lang = 'ar';
const circleRadius = 38;
const circleCircumference = 2 * Math.PI * circleRadius;

function updateCircleProgress(count, max) {
    const ring = document.getElementById('progressRing');
    const progress = count / max;
    const offset = circleCircumference - (progress * circleCircumference);
    ring.style.strokeDasharray = `${circleCircumference} ${circleCircumference}`;
    ring.style.strokeDashoffset = offset;
}

function render() {
    const category = azkarData[currentCat];
    document.getElementById('arabicText').innerText = category.arabic[currentIndex];
    document.getElementById('translationText').innerText = category.trans[currentIndex];
    document.getElementById('progressVal').innerText = `${currentIndex + 1} / ${category.arabic.length}`;
    
    document.getElementById('circleCount').innerText = currentCount;
    document.getElementById('lblProgress').innerText = lang === 'ar' ? "التقدم" : "PROGRESS";
    document.getElementById('lblRepeat').innerText = lang === 'ar' ? "التكرار" : "REPEAT";
    
    document.getElementById('set1').innerText = lang === 'ar' ? "صوت النقرة" : "Click Sound";
    document.getElementById('set2').innerText = lang === 'ar' ? "صوت الاهتزاز" : "Vibration Sound";
    document.getElementById('set3').innerText = lang === 'ar' ? "تحويل تلقائي" : "Auto Transfer";

    // Update Color Tooltips language
    document.querySelectorAll('.color-dot').forEach(dot => {
        dot.setAttribute('data-name', lang === 'ar' ? dot.getAttribute('data-ar') : dot.getAttribute('data-en'));
    });

    updateCircleProgress(currentCount, category.reps[currentIndex]);
    for(let i=0; i<4; i++) {
        document.getElementById('t'+i).innerText = (lang === 'ar') ? azkarData[i].nameAr : azkarData[i].nameEn;
    }
}

function incrementCount() {
    const max = azkarData[currentCat].reps[currentIndex];
    if (currentCount < max) {
        currentCount++;
        playTapSound();
        document.getElementById('circleCount').innerText = currentCount;
        updateCircleProgress(currentCount, max);
        if (currentCount === max) {
            playVibrateSound();
            if(document.getElementById('chkAuto').checked) {
                setTimeout(() => { next(); }, 600);
            }
        }
    }
}

function next() { currentIndex = (currentIndex + 1) % azkarData[currentCat].arabic.length; currentCount = 0; render(); }
function prev() { currentIndex = (currentIndex - 1 + azkarData[currentCat].arabic.length) % azkarData[currentCat].arabic.length; currentCount = 0; render(); }
function changeCat(index) { currentCat = index; currentIndex = 0; currentCount = 0; document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index)); render(); }
function toggleLang() { lang = (lang === 'ar') ? 'en' : 'ar'; render(); }

function toggleMenu(menuId) {
    const menus = ['colorMenu', 'settingsMenu'];
    menus.forEach(id => {
        const el = document.getElementById(id);
        if(id === menuId) el.classList.toggle('show');
        else el.classList.remove('show');
    });
}

function applyTheme(bg, acc, isLight = false) {
    const root = document.documentElement;
    root.style.setProperty('--bg', bg);
    root.style.setProperty('--accent', acc);
    root.style.setProperty('--text', isLight ? '#333' : '#FFF');
    root.style.setProperty('--text-dim', isLight ? '#666' : '#B1A2C1');
    document.getElementById('colorMenu').classList.remove('show');
}

render();
</script>
</body>
</html>
