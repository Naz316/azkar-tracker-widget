<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azkar Master Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1E122C;
            --accent: #7446A0;
            --card: rgba(255, 255, 255, 0.05);
            --text: #FFFFFF;
            --text-dim: #B1A2C1;
            --font-arabic: 'Amiri', serif;
        }

        body {
            background: #121212;
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
        }

        .widget {
            width: 95%; max-width: 500px; height: 90vh;
            background-color: var(--bg);
            border-radius: 32px; padding: 25px;
            display: flex; flex-direction: column;
            position: relative; box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            transition: background 0.4s ease;
        }

        /* HEADER */
        .header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            height: 60px;
            margin-bottom: 20px;
            z-index: 100;
        }
        .header-left { display: flex; justify-content: flex-start; }
        .header-right { display: flex; justify-content: flex-end; }
        .icon-btn {
            background: none; border: none; cursor: pointer;
            width: 40px; height: 40px; padding: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .icon-btn img { width: 35px; height: 35px; object-fit: contain; }
        .palette-emoji { font-size: 32px; line-height: 1; }

        .floating-icon {
            width: 70px; height: 70px;
            cursor: pointer;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* TABS */
        .tabs {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 8px; margin-bottom: 15px;
        }
        .tab {
            background: transparent; border: none; color: var(--text-dim);
            padding: 8px 2px; border-radius: 12px; cursor: pointer;
            font-size: 10px; font-weight: 700; text-align: center;
            transition: 0.3s; display: flex; flex-direction: column; align-items: center;
        }
        .tab.active { background: var(--accent); color: white; }
        .tab span { font-size: 20px; margin-bottom: 2px; }

        /* MAIN CONTENT */
        .main-display {
            flex-grow: 1; overflow-y: auto; padding: 15px;
            text-align: center; display: flex; flex-direction: column;
            background: rgba(0,0,0,0.15); border-radius: 20px;
            margin-bottom: 15px;
        }
        .arabic {
            font-family: var(--font-arabic); font-size: 24px; color: var(--text);
            direction: rtl; line-height: 1.8; margin-bottom: 15px;
            white-space: pre-wrap;
        }
        .translation { font-size: 16px; color: var(--text-dim); line-height: 1.6; }

        /* FOOTER & PROGRESS CIRCLE */
        .footer-controls {
            display: flex; justify-content: space-between; align-items: center;
            height: 100px;
        }
        .side-info { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .info-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .info-value { font-size: 15px; color: var(--text); font-weight: 700; white-space: nowrap; }

        .counter-container {
            position: relative;
            width: 85px; height: 85px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; margin: 0 10px;
        }
        .counter-container svg {
            position: absolute;
            transform: rotate(-90deg);
            width: 100%; height: 100%;
        }
        .circle-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 6; }
        .circle-progress {
            fill: none;
            stroke: var(--accent);
            stroke-width: 6;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s ease;
        }
        #circleCount {
            font-size: 28px; font-weight: 700; color: var(--text);
            z-index: 2;
        }

        .nav-btn { background: none; border: none; color: var(--text); font-size: 24px; cursor: pointer; padding: 10px; }

        /* COLOR MENU */
        .color-menu {
            position: absolute; top: 70px; right: 25px;
            background: #1A1A1A; padding: 15px; border-radius: 16px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            visibility: hidden; opacity: 0; transition: 0.3s; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
        }
        .color-menu.show { visibility: visible; opacity: 1; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; }

        .main-display::-webkit-scrollbar { width: 4px; }
        .main-display::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="widget">
    <div class="header">
        <div class="header-left">
            <button class="icon-btn" onclick="toggleLang()">
                <img src="https://cdn-icons-png.flaticon.com/128/6212/6212766.png" alt="Language">
            </button>
        </div>
        <div class="header-center">
            <img id="cycleIcon" class="floating-icon" src="https://cdn-icons-png.flaticon.com/128/4354/4354959.png" onclick="changeIcon()" alt="Icon">
        </div>
        <div class="header-right">
            <button class="icon-btn palette-emoji" onclick="toggleColors()">🎨</button>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab active" onclick="changeCat(0)"><span>🛌</span><label id="t0">Waking</label></button>
        <button class="tab" onclick="changeCat(1)"><span>☀️</span><label id="t1">Morning</label></button>
        <button class="tab" onclick="changeCat(2)"><span>🌆</span><label id="t2">Evening</label></button>
        <button class="tab" onclick="changeCat(3)"><span>🌙</span><label id="t3">Sleep</label></button>
    </div>

    <div class="main-display" id="scrollArea">
        <div class="arabic" id="arabicText"></div>
        <div class="translation" id="translationText"></div>
    </div>

    <div class="footer-controls">
        <button class="nav-btn" onclick="prev()">❮</button>
        <div class="side-info">
            <span class="info-label" id="lblProgress">PROGRESS</span>
            <span class="info-value" id="progressVal">1 / 26</span>
        </div>

        <div class="counter-container" onclick="incrementCount()">
            <svg>
                <circle class="circle-bg" cx="42.5" cy="42.5" r="38"></circle>
                <circle id="progressRing" class="circle-progress" cx="42.5" cy="42.5" r="38"></circle>
            </svg>
            <div id="circleCount">0</div>
        </div>

        <div class="side-info">
            <span class="info-label" id="lblRepeat">REPEAT</span>
            <span class="info-value" id="repeatVal">مرة واحدة</span>
        </div>
        <button class="nav-btn" onclick="next()">❯</button>
    </div>

    <div class="color-menu" id="colorMenu">
        <div class="color-dot" data-name="Red" style="background:#cc0000" onclick="applyTheme('#3B1414', '#cc0000')"></div>
        <div class="color-dot" data-name="Blue" style="background:#0066cc" onclick="applyTheme('#0A192F', '#0066cc')"></div>
        <div class="color-dot" data-name="Brown" style="background:#663300" onclick="applyTheme('#2D1B0D', '#8B4513')"></div>
        <div class="color-dot" data-name="Yellow" style="background:#ffcc00" onclick="applyTheme('#332B00', '#ffcc00')"></div>
        <div class="color-dot" data-name="Black" style="background:#000000" onclick="applyTheme('#000000', '#444444')"></div>
        <div class="color-dot" data-name="Gray" style="background:#808080" onclick="applyTheme('#222222', '#808080')"></div>
        <div class="color-dot" data-name="Cloud" style="background:#ffffff; border:1px solid #ccc" onclick="applyTheme('#f5f5f5', '#7446A0', true)"></div>
        <div class="color-dot" data-name="Pink" style="background:#ff66b2" onclick="applyTheme('#331122', '#ff66b2')"></div>
        <div class="color-dot" data-name="Green" style="background:#228b22" onclick="applyTheme('#0D2612', '#228b22')"></div>
        <div class="color-dot" data-name="Purple" style="background:#800080" onclick="applyTheme('#1E122C', '#800080')"></div>
        <div class="color-dot" data-name="Orange" style="background:#ff8c00" onclick="applyTheme('#2E1A00', '#ff8c00')"></div>
        <div class="color-dot" data-name="Teal" style="background:#008080" onclick="applyTheme('#002222', '#008080')"></div>
    </div>
</div>

<script>
const iconGallery = [
    "https://cdn-icons-png.flaticon.com/128/4354/4354959.png",
    "https://cdn-icons-png.flaticon.com/128/7321/7321058.png",
    "https://cdn-icons-png.flaticon.com/128/3004/3004949.png",
    "https://cdn-icons-png.flaticon.com/128/6152/6152858.png",
    "https://cdn-icons-png.flaticon.com/128/15428/15428976.png"
];
let currentIconIdx = 0;
function changeIcon() {
    currentIconIdx = (currentIconIdx + 1) % iconGallery.length;
    document.getElementById('cycleIcon').src = iconGallery[currentIconIdx];
}

const azkarData = [
    {
        nameEn: "Waking", nameAr: "الاستيقاظ",
        arabic: ["الْحَمْدُ لِلَّهِ الَّذِي أَحْيَانَا بَعْدَ مَا أَمَاتَنَا وَإِلَيْهِ النُّشُورُ"],
        trans: ["Praise be to Allah who gave us life after having taken it from us, and unto Him is the resurrection."],
        reps: [1]
    },
    {
        nameEn: "Morning", nameAr: "الصباح",
        arabic: [
            "أَعُوْذُ بِاللّٰهِ مِنَ الشَّيْطَانِ الرَّجِيْمِ. اَللّٰهُ لَآ إِلٰهَ إِلَّا هُوَ الْحَىُّ الْقَيُّوْمُ ، لَا تَأْخُذُهُۥ سِنَةٌ وَّلَا نَوْمٌ ، لَهُ مَا فِى السَّمٰـوٰتِ وَمَا فِى الْأَرْضِ ، مَنْ ذَا الَّذِىْ يَشْفَعُ عِنْدَهُ إِلَّا بِإِذْنِهِۦ ، يَعْلَمُ مَا بَيْنَ أَيْدِيْهِمْ وَمَا خَلْفَهُمْ ، وَلَا يُحِيْطُوْنَ بِشَىْءٍ مِّنْ عِلْمِهِٓ إِلَّا بِمَا شَآءَ ، وَسِعَ كُرْسِيُّهُ السَّمٰـوٰتِ وَالْأَرْضَ، وَلَا يَئُوْدُهُۥ حِفْظُهُمَا ، وَهُوَ الْعَلِىُّ الْعَظِيْمُ.",
            "بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ. قُلْ هُوَ اللّٰهُ أَحَدٌ ، اَللّٰهُ الصَّمَدُ ، لَمْ يَلِدْ وَلَمْ يُوْلَدْ ، وَلَمْ يَكُنْ لَّهُ كُفُوًا أَحَدٌ.",
            "بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ. قُلْ أَعُوْذُ بِرَبِّ الْفَلَقِ ، مِنْ شَرِّ مَا خَلَقَ ، وَمِنْ شَرِّ غَاسِقٍ إِذَا وَقَبَ ، وَمِنْ شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ ، وَمِنْ شَرِّ حَاسِدٍ إِذَا حَسَدَ.",
            "بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ. قُلْ أَعُوْذُ بِرَبِّ النَّاسِ ، مَلِكِ النَّاسِ ، إِلٰهِ النَّاسِ ، مِنْ شَرِّ الْوَسْوَاسِ الْخَنَّاسِ ، اَلَّذِيْ يُوَسْوِسُ فِيْ صُدُوْرِ النَّاسِ ، مِنَ الْجِنَّةِ وَالنَّاسِ.",
            "اَللّٰهُمَّ أَنْتَ رَبِّيْ لَا إِلٰهَ إِلَّا أَنْتَ ، خَلقتَنِيْ وَأَنَا عَبْدُكَ ، وَأَنَا عَلَىٰ عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ ، أَعُوْذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ ، أَبُوْءُ لَكَ بِنِعْمَتِكَ عَلَيَّ وَأَبُوْءُ لَكَ بِذَنْبِيْ ، فَاغْفِرْ لِيْ فَإِنَّهُ لَا يَغْفِرُ الذُّنُوْبَ إِلَّا أَنْتَ.",
            "اَللّٰهُمَّ إِنِّيْ أَعُوْذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ ، وَأَعُوْذُ بِكَ مِنَ الْعَجْزِ وَالْكَسَلِ، وَأَعُوْذُ بِكَ مِنَ الْجُبْنِ وَالْبُخْلِ ، وَأَعُوْذُ بِكَ مِنْ غَلَبَةِ الدَّيْنِ وَقَهْرِ الرِّجَالِ.",
            "اَللّٰهُمَّ إِنِّيْ أَسْأَلُكَ الْعَافِيَةَ فِي الدُّنْيَا وَالْآخِرَةِ ، اَللّٰهُمَّ إِنِّيْ أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِيْ دِيْنِيْ وَدُنْيَايَ وَأَهْلِيْ وَمَالِيْ ، اَللّٰهُمَّ اسْتُرْ عَوْرَاتِيْ وَآمِنْ رَوْعَاتِيْ ، اَللّٰهُمَّ احْفَظْنِيْ مِنْ بَيْنِ يَدَيَّ ، وَمِنْ خَلْفِيْ ، وَعَنْ يَّمِيْنِيْ ، وَعَنْ شِمَالِيْ ، وَمِنْ فَوْقِيْ ، وَأَعُوْذُ بِعَظَمَتِكَ أَنْ أُغْتَالَ مِنْ تَحْتِيْ.",
            "اَللّٰهُمَّ عَالِمَ الْغَيْبِ وَالشَّهَادَةِ ، فَاطِرَ السَّمٰوَاتِ وَالْأَرْضِ ، رَبَّ كُلِّ شَيْءٍ وَمَلِيْكَهُ ، أَشْهَدُ أَنْ لَّا إِلٰهَ إِلَّا أَنْتَ ، أَعُوْذُ بِكَ مِنْ شَرِّ نَفْسِيْ ، وَمِنْ شَرِّ الشَّيْطَانِ وَشِرْكِهِ ، وَأَنْ أَقْتَرِفَ عَلَىٰ نَفْسِيْ سُوْءًا ، أَوْ أَجُرَّهُ إِلَىٰ مُسْلِمٍ.",
            "يَا حَيُّ يَا قَيُّوْمُ ، بِرَحْمَتِكَ أَسْتَغِيْثُ ، أَصْلِحْ لِيْ شَأْنِيْ كُلَّهُ ، وَلَا تَكِلْنِيْ إِلَىٰ نَفْسِيْ طَرْفَةَ عَيْنٍ.",
            "اَللّٰهُمَّ مَا أَصْبَحَ بِيْ مِنْ نِّعْمَةٍ أَوْ بِأَحَدٍ مِّنْ خَلْقِكَ ، فَمِنْكَ وَحْدَكَ لَا شَرِيْكَ لَكَ ، فَلَكَ الْحَمْدُ وَلَكَ الشُّكْرُ.",
            "أَصْبَحْنَا عَلَىٰ فِطْرَةِ الْإِسْلَامِ ، وَعَلَىٰ كَلِمَةِ الْإِخْلَاصِ ، وَعَلَىٰ دِيْنِ نَبِيِّنَا مُحَمَّدٍ ، وَعَلَىٰ مِلَّةِ أَبِيْنَا إِبْرَاهِيْمَ حَنِيْفًا مُّسْلِمًا وَّمَا كَانَ مِنَ الْمُشْرِكِيْنَ.",
            "أَصْبَحْتُ أُثْنِيْ عَلَيْكَ حَمْدًا ، وَأَشْهَدُ أَنْ لَّا إِلٰهَ إِلَّا اللّٰهُ.",
            "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلّٰهِ وَالْحَمْدُ لِلّٰهِ ، لَا إِلٰهَ إِلَّا اللّٰهُ وَحْدَهُ لَا شَرِيْكَ لَهُ ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ ، وَهُوَ عَلَىٰ كُلِّ شَيْءٍ قَدِيْرٌ ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِيْ هٰذَا الْيَوْمِ وَخَيْرَ مَا بَعْدَهُ ، وَأَعُوْذُ بِكَ مِنْ شَرِّ مَا فِيْ هٰذَا الْيَوْمِ وَشَرِّ مَا بَعْدَهُ ، رَبِّ أَعُوْذُ بِكَ مِنَ الْكَسَلِ وَسُوْءِ الْكِبَرِ ، رَبِّ أَعُوْذُ بِكَ مِنْ عَذَابٍ فِي النَّارِ وَعَذَابٍ فِي الْقَبْرِ.",
            "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلّٰهِ رَبِّ الْعَالَمِيْنَ ، اَللّٰهُمَّ إِنِّيْ أَسْأَلُكَ خَيْرَ هٰذَا الْيَوْمِ ، فَتْحَهُ وَنَصْرَهُ وَنُوْرَهُ وَبَرَكَتَهُ وَهُدَاهُ ، وَأَعُوْذُ بِكَ مِنْ شَرِّ مَا فِيْهِ وَشَرِّ مَا بَعْدَهُ.",
            "اَللّٰهُمَّ إِنِّيْ أَصْبَحْتُ أُشْهِدُكَ ، وَأُشْهِدُ حَمَلَةَ عَرْشِكَ وَمَلَائِكَتَكَ وَجَمِيْعَ خَلْقِكَ ، أَنَّكَ أَنْتَ اللّٰهُ لَا إِلٰهَ إِلَّا أَنْتَ وَحْدَكَ لَا شَرِيْكَ لَكَ ، وَأَنَّ مُحَمَّدًا عَبْدُكَ وَرَسُوْلُكَ.",
            "اَللّٰهُمَّ بِكَ أَصْبَحْنَا وَبِكَ أَمْسَيْنَا وَبِكَ نَحْيَا وَبِكَ نَمُوْتُ وَإِلَيْكَ النُّشُوْرُ.",

let currentCat = 0, currentIndex = 0, currentCount = 0, lang = 'ar';
const circleRadius = 38;
const circleCircumference = 2 * Math.PI * circleRadius;

function updateCircleProgress(count, max) {
    const ring = document.getElementById('progressRing');
    const progress = count / max;
    const offset = circleCircumference - (progress * circleCircumference);
    ring.style.strokeDasharray = `${circleCircumference} ${circleCircumference}`;
    ring.style.strokeDashoffset = offset;
}

function getRepetitionText(count, currentLang) {
    if (currentLang === 'en') return count === 1 ? "1 Time" : count + " Times";
    switch(count) {
        case 1: return "مرة واحدة";
        case 2: return "مرتان";
        case 3: return "ثلاث مرات";
        case 7: return "سبع مرات";
        case 10: return "عشر مرات";
        case 100: return "مئة مرة";
        default: return count + " مرات";
    }
}

function render() {
    const category = azkarData[currentCat];
    document.getElementById('arabicText').innerText = category.arabic[currentIndex];
    document.getElementById('translationText').innerText = category.trans[currentIndex];
    document.getElementById('progressVal').innerText = `${currentIndex + 1} / ${category.arabic.length}`;
    
    document.getElementById('repeatVal').innerText = getRepetitionText(category.reps[currentIndex], lang);
    document.getElementById('circleCount').innerText = currentCount;
    document.getElementById('lblProgress').innerText = lang === 'ar' ? "التقدم" : "PROGRESS";
    document.getElementById('lblRepeat').innerText = lang === 'ar' ? "التكرار" : "REPEAT";
    
    updateCircleProgress(currentCount, category.reps[currentIndex]);

    for(let i=0; i<4; i++) {
        document.getElementById('t'+i).innerText = (lang === 'ar') ? azkarData[i].nameAr : azkarData[i].nameEn;
    }
    document.getElementById('scrollArea').scrollTop = 0;
}

function incrementCount() {
    const max = azkarData[currentCat].reps[currentIndex];
    if (currentCount < max) {
        currentCount++;
        document.getElementById('circleCount').innerText = currentCount;
        updateCircleProgress(currentCount, max);
    }
}

function next() { currentIndex = (currentIndex + 1) % azkarData[currentCat].arabic.length; currentCount = 0; render(); }
function prev() { currentIndex = (currentIndex - 1 + azkarData[currentCat].arabic.length) % azkarData[currentCat].arabic.length; currentCount = 0; render(); }
function changeCat(index) { currentCat = index; currentIndex = 0; currentCount = 0; document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index)); render(); }
function toggleLang() { lang = (lang === 'ar') ? 'en' : 'ar'; render(); }
function toggleColors() { document.getElementById('colorMenu').classList.toggle('show'); }

function applyTheme(bg, acc, isLight = false) {
    const root = document.documentElement;
    root.style.setProperty('--bg', bg);
    root.style.setProperty('--accent', acc);
    root.style.setProperty('--text', isLight ? '#333' : '#FFF');
    root.style.setProperty('--text-dim', isLight ? '#666' : '#B1A2C1');
    document.getElementById('colorMenu').classList.remove('show');
}

render();
</script>
