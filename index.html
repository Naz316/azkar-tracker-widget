<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azkar Master Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1E122C;
            --accent: #7446A0;
            --card: rgba(255, 255, 255, 0.05);
            --text: #FFFFFF;
            --text-dim: #B1A2C1;
            --circle-border: rgba(255,255,255,0.3);
            --font-arabic: 'Reem Kufi', serif;
        }

        body {
            background: #121212;
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
        }

        .widget {
            width: 95%; max-width: 500px; height: 85vh;
            background-color: var(--bg);
            border-radius: 24px; padding: 25px;
            display: flex; flex-direction: column;
            position: relative; box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            transition: background 0.4s ease;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
            z-index: 10;
        }

        .lang-toggle {
            background: var(--card); border: 1px solid var(--text-dim);
            color: var(--text); padding: 5px 12px; border-radius: 20px;
            cursor: pointer; font-size: 12px; font-weight: bold;
        }

        /* Floating Icon Styles */
        .floating-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; /* So it doesn't block text scrolling */
            z-index: 1;
            opacity: 0.15; /* Subtle background look */
        }

        .floating-icon {
            width: 120px; height: 120px;
            cursor: pointer;
            pointer-events: auto; /* Make only icon clickable */
            animation: float 4s ease-in-out infinite;
            transition: transform 0.3s ease;
        }

        .floating-icon:active { transform: scale(0.9); }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .tabs {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 5px; margin-bottom: 20px; z-index: 10;
        }
        .tab {
            background: var(--card); border: none; color: var(--text-dim);
            padding: 10px 2px; border-radius: 12px; cursor: pointer;
            font-size: 10px; font-weight: 700; text-align: center;
            transition: 0.3s; display: flex; flex-direction: column; align-items: center;
        }
        .tab.active { background: var(--accent); color: white; }
        .tab span { font-size: 18px; margin-bottom: 4px; }

        .main-display {
            flex-grow: 1; overflow-y: auto; padding: 15px;
            text-align: center; display: flex; flex-direction: column;
            background: rgba(0,0,0,0.1); border-radius: 15px;
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent;
            min-height: 0; z-index: 5;
            position: relative;
        }
        
        .arabic {
            font-family: var(--font-arabic); font-size: 24px; color: var(--text);
            direction: rtl; line-height: 1.8; margin-bottom: 20px;
            position: relative; z-index: 6;
        }
        .divider { height: 1px; background: rgba(255,255,255,0.1); width: 60%; margin: 0 auto 20px; flex-shrink: 0; }
        .translation { font-size: 15px; color: var(--text-dim); line-height: 1.6; margin-bottom: 20px; z-index: 6; }

        .footer-controls {
            display: flex; justify-content: space-between; align-items: center;
            padding-top: 20px; margin-top: 10px; height: 80px;
            border-top: 1px solid rgba(255,255,255,0.1); z-index: 10;
        }

        .side-info {
            flex: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100%;
        }
        .info-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        .info-value { font-size: 14px; color: var(--text); font-weight: 700; }
        .repeat-label { font-family: var(--font-arabic); font-size: 15px; color: var(--text); }

        .counter-circle {
            width: 70px; height: 70px; border-radius: 50%;
            border: 3px solid var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; font-weight: 700; color: var(--text);
            cursor: pointer; transition: 0.2s; background: var(--card);
            margin: 0 10px; flex-shrink: 0;
        }
        .counter-circle:active { transform: scale(0.95); }

        .nav-btn {
            background: var(--card); border: none; color: var(--text);
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }

        .color-menu {
            position: absolute; top: 60px; right: 25px;
            background: #1A1A1A; padding: 12px; border-radius: 12px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
            visibility: hidden; opacity: 0; transition: 0.3s; z-index: 9999;
            box-shadow: 0 8px 25px rgba(0,0,0,0.8);
        }
        .color-menu.show { visibility: visible; opacity: 1; }
        .color-dot { 
            width: 28px; height: 28px; border-radius: 50%; cursor: pointer; 
            border: 2px solid rgba(255,255,255,0.1); position: relative;
        }
        .color-dot:hover::after {
            content: attr(data-name);
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            font-size: 10px; color: white; background: #333; padding: 4px 8px;
            border-radius: 4px; white-space: nowrap; z-index: 10000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .main-display::-webkit-scrollbar { width: 4px; }
        .main-display::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="widget">
    <!-- Floating Icon Container -->
    <div class="floating-container">
        <div id="cycleIcon" class="floating-icon" onclick="changeIcon()">
            <!-- Initial Icon (Beads) -->
            <svg viewBox="0 0 64 64" fill="currentColor"><path d="M32 8C18.8 8 8 18.8 8 32s10.8 24 24 24 24-10.8 24-24S45.2 8 32 8zm0 42c-9.9 0-18-8.1-18-18s8.1-18 18-18 18 8.1 18 18-8.1 18-18 18z"/><circle cx="32" cy="18" r="3"/><circle cx="42" cy="22" r="3"/><circle cx="48" cy="32" r="3"/><circle cx="42" cy="42" r="3"/><circle cx="32" cy="48" r="3"/><circle cx="22" cy="42" r="3"/><circle cx="16" cy="32" r="3"/><circle cx="22" cy="22" r="3"/></svg>
        </div>
    </div>

    <div class="header">
        <button class="lang-toggle" onclick="toggleLang()" id="langBtn">EN / عربي</button>
        <button style="background:none; border:none; cursor:pointer; font-size:20px;" onclick="toggleColors()">🎨</button>
    </div>
    
    <div class="tabs" id="tabs">
        <button class="tab active" onclick="changeCat(0)"><span>☀️</span><label id="t0">Morning</label></button>
        <button class="tab" onclick="changeCat(1)"><span>🌆</span><label id="t1">Evening</label></button>
        <button class="tab" onclick="changeCat(2)"><span>🌙</span><label id="t2">Sleep</label></button>
        <button class="tab" onclick="changeCat(3)"><span>🛌</span><label id="t3">Waking Up</label></button>
    </div>

    <div class="main-display" id="scrollArea">
        <div class="arabic" id="arabicText"></div>
        <div class="divider"></div>
        <div class="translation" id="translationText"></div>
    </div>

    <div class="footer-controls">
        <button class="nav-btn" onclick="prev()">❮</button>
        
        <div class="side-info">
            <span class="info-label" id="lblProgress">Progress</span>
            <span class="info-value" id="progressVal">1 / 26</span>
        </div>

        <div class="counter-circle" id="circleCount" onclick="incrementCount()">0</div>

        <div class="side-info">
            <span class="info-label" id="lblRepeat">Repeat</span>
            <span class="repeat-label" id="repeatVal">مرة واحدة</span>
        </div>

        <button class="nav-btn" onclick="next()">❯</button>
    </div>

    <div class="color-menu" id="colorMenu">
        <div class="color-dot" data-name="Plum" style="background:#4D1D3D" onclick="applyTheme('#4D1D3D', '#9B3675')"></div>
        <div class="color-dot" data-name="Amethyst" style="background:#1E122C" onclick="applyTheme('#1E122C', '#7446A0')"></div>
        <div class="color-dot" data-name="Ruby" style="background:#3B1414" onclick="applyTheme('#3B1414', '#992E2E')"></div>
        <div class="color-dot" data-name="Mocha" style="background:#3E2723" onclick="applyTheme('#3E2723', '#8D6E63')"></div>
        <div class="color-dot" data-name="Forest" style="background:#1B5E20" onclick="applyTheme('#1B5E20', '#4CAF50')"></div>
        <div class="color-dot" data-name="Ocean" style="background:#0D47A1" onclick="applyTheme('#0D47A1', '#42A5F5')"></div>
        <div class="color-dot" data-name="Midnight" style="background:#000000" onclick="applyTheme('#000000', '#555555')"></div>
        <div class="color-dot" data-name="Cloud" style="background:#f5f5f5" onclick="applyTheme('#f5f5f5', '#7446A0', true)"></div>
    </div>
</div>

<script>

let currentCat = 0;
let currentIndex = 0;
let currentCount = 0;
let lang = 'ar';

function render() {
    const category = azkarData[currentCat];
    document.getElementById('arabicText').innerText = category.arabic[currentIndex];
    document.getElementById('translationText').innerText = category.trans[currentIndex];
    document.getElementById('progressVal').innerText = `${currentIndex + 1} / ${category.arabic.length}`;
    
    let maxReps = category.reps[currentIndex];
    let repText = "";
    if (lang === 'ar') {
        if (maxReps === 1) repText = "مرة واحدة";
        else if (maxReps === 2) repText = "مرتان";
        else if (maxReps <= 10) repText = maxReps + " مرات";
        else repText = maxReps + " مرة";
    } else {
        repText = maxReps + (maxReps === 1 ? " Time" : " Times");
    }

    document.getElementById('repeatVal').innerText = repText;
    document.getElementById('circleCount').innerText = currentCount;
    document.getElementById('lblProgress').innerText = (lang === 'ar') ? "التقدم" : "Progress";
    document.getElementById('lblRepeat').innerText = (lang === 'ar') ? "التكرار" : "Repeat";
    
    for(let i=0; i<4; i++) {
        document.getElementById('t'+i).innerText = (lang === 'ar') ? azkarData[i].nameAr : azkarData[i].nameEn;
    }
    document.getElementById('scrollArea').scrollTop = 0;
}

function incrementCount() {
    const maxReps = azkarData[currentCat].reps[currentIndex];
    if (currentCount < maxReps) {
        currentCount++;
        document.getElementById('circleCount').innerText = currentCount;
    }
}

function next() {
    currentIndex = (currentIndex + 1) % azkarData[currentCat].arabic.length;
    currentCount = 0;
    render();
}

function prev() {
    currentIndex = (currentIndex - 1 + azkarData[currentCat].arabic.length) % azkarData[currentCat].arabic.length;
    currentCount = 0;
    render();
}

function changeCat(index) {
    currentCat = index;
    currentIndex = 0;
    currentCount = 0;
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
    render();
}

function toggleLang() {
    lang = (lang === 'ar') ? 'en' : 'ar';
    render();
}

function toggleColors() {
    document.getElementById('colorMenu').classList.toggle('show');
}

function applyTheme(bg, acc, isLight = false) {
    const root = document.documentElement;
    root.style.setProperty('--bg', bg);
    root.style.setProperty('--accent', acc);
    root.style.setProperty('--text', isLight ? '#333' : '#FFF');
    root.style.setProperty('--text-dim', isLight ? '#666' : '#B1A2C1');
    root.style.setProperty('--card', isLight ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)');
    document.getElementById('colorMenu').classList.remove('show');
}

render();
</script>
</body>
</html>
